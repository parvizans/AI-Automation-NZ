<script>

/* DATE */
document.getElementById("today").innerText =
new Date().toLocaleDateString();

/* NAVIGATION */
function goHome(){
  window.location.href = "timesheet.html";
}

/* CALCULATE */
function calculate(){

  const data = JSON.parse(localStorage.getItem("invoiceData")) || {};

  const wdDays = +data.wdDays || 0;
  const weDays = +data.weDays || 0;
  const wdOT = +data.wdOT || 0;
  const weOT = +data.weOT || 0;

  const foodDays = wdDays + weDays;

  const wdRate = 240;
  const weRate = 280;
  const wdOTRate = 30;
  const weOTRate = 35;
  const foodRate = 50;

  const expenses = +document.getElementById("expenses").value || 0;
  const cash = +document.getElementById("cash").value || 0;

  const rows = [
    ["Weekdays", wdDays, wdRate, wdDays * wdRate],
    ["Weekend Days", weDays, weRate, weDays * weRate],
    ["Weekday OT (Hours)", wdOT, wdOTRate, wdOT * wdOTRate],
    ["Weekend OT (Hours)", weOT, weOTRate, weOT * weOTRate],
    ["Food Allowance", foodDays, foodRate, foodDays * foodRate]
  ];

  let total = 0;

  const tbody = document.getElementById("invoice-body");
  tbody.innerHTML = "";

  rows.forEach(r=>{
    total += r[3];
    tbody.innerHTML += `
      <tr>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
        <td>$${r[2]}</td>
        <td>$${r[3].toFixed(2)}</td>
      </tr>
    `;
  });

  total += expenses;

  document.getElementById("total").innerText =
    "$" + total.toFixed(2);

  document.getElementById("final").innerText =
    "$" + (total - cash).toFixed(2);
}
  window.onload = function(){

  const data = JSON.parse(localStorage.getItem("invoiceData"));

  if(!data) return;

  document.getElementById("inv-name").value = data.name;
  document.getElementById("inv-hours").value = data.totalHours;

};

  function calculateInvoice(){

  const hours = Number(document.getElementById("inv-hours").value) || 0;
  const rate = Number(document.getElementById("rate-weekday").value) || 0;

  const total = hours * rate;

  document.getElementById("finalTotal").innerText = total.toFixed(2);
}

</script>
