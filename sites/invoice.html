<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice Generator</title>

<style>
body {
  font-family: Arial;
  background: 
    linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)),
    url("https://images.unsplash.com/photo-1554224155-6726b3ff858f");
  background-size: cover;
  background-position: center;
  padding: 20px;
}
.container { max-width:1000px; margin:auto; }

.header {
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.box {
  border:1px solid #000;
  padding:10px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td {
  border:1px solid #000;
  padding:10px;
}

th { background:#ddd; }

.total-row { font-weight:bold; }

.final {
  background:yellow;
  color:red;
  font-weight:bold;
}

button {
  margin-top:20px;
  padding:10px 20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div>
<b>Parviz Ansari</b><br>
Street Address: East Killara<br>
Phone: +64220100700
</div>

<div>
<b>INVOICE #008</b><br>
Date: <span id="today"></span>
</div>
</div>

<div class="box">
<b>TO:</b><br>
LINKQUEST TELECOM AUSTRALIA PTY LTD<br>
LEVEL 5 NEXUS NORWEST
</div>

<div class="box" style="margin-top:10px;">
<b>FOR:</b><br>
ACCENTURE WALKTEST & DRIVE TEST PROJECT
</div>

<table>
<thead>
<tr>
<th>Description</th>
<th>Qty</th>
<th>Rate</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="invoice-body"></tbody>

<tfoot>
<tr class="total-row">
<td colspan="3">Total</td>
<td id="total"></td>
</tr>

<tr>
<td colspan="3">Expenses</td>
<td><input id="expenses" value="0"></td>
</tr>

<tr>
<td colspan="3">Cash Advance</td>
<td><input id="cash" value="1000"></td>
</tr>

<tr class="final">
<td colspan="3">Final Payable</td>
<td id="final"></td>
</tr>
</tfoot>
</table>

<button onclick="calculate()">Calculate</button>
<button onclick="window.print()">Print / Save PDF</button>

<div style="margin-top:30px;">
<button onclick="goHome()" style="
  background:#32d296;
  color:#000;
  padding:10px 20px;
  border:none;
  border-radius:6px;
  font-weight:bold;
">
🏠 Back to Timesheet
</button>
</div>

</div>

<script>

/* DATE */
document.getElementById("today").innerText =
new Date().toLocaleDateString();

/* NAVIGATION */
function goHome(){
  window.location.href = "timesheet.html";
}

/* CALCULATE */
function calculate(){

  const data = JSON.parse(localStorage.getItem("invoiceData")) || {};

  const wdDays = +data.wdDays || 0;
  const weDays = +data.weDays || 0;
  const wdOT = +data.wdOT || 0;
  const weOT = +data.weOT || 0;

  const foodDays = wdDays + weDays;

  const wdRate = 240;
  const weRate = 280;
  const wdOTRate = 30;
  const weOTRate = 35;
  const foodRate = 50;

  const expenses = +document.getElementById("expenses").value || 0;
  const cash = +document.getElementById("cash").value || 0;

  const rows = [
    ["Weekdays", wdDays, wdRate, wdDays * wdRate],
    ["Weekend Days", weDays, weRate, weDays * weRate],
    ["Weekday OT (Hours)", wdOT, wdOTRate, wdOT * wdOTRate],
    ["Weekend OT (Hours)", weOT, weOTRate, weOT * weOTRate],
    ["Food Allowance", foodDays, foodRate, foodDays * foodRate]
  ];

  let total = 0;

  const tbody = document.getElementById("invoice-body");
  tbody.innerHTML = "";

  rows.forEach(r=>{
    total += r[3];
    tbody.innerHTML += `
      <tr>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
        <td>$${r[2]}</td>
        <td>$${r[3].toFixed(2)}</td>
      </tr>
    `;
  });

  total += expenses;

  document.getElementById("total").innerText =
    "$" + total.toFixed(2);

  document.getElementById("final").innerText =
    "$" + (total - cash).toFixed(2);
}

</script>

</body>
</html>
