<script>

/* LOAD DATA */
const data = JSON.parse(localStorage.getItem("invoiceData")) || {};

document.getElementById("name").innerText = data.name || "";
document.getElementById("project").innerText = data.project || "";
document.getElementById("inv").innerText = data.invoiceNo || "";
document.getElementById("date").innerText = new Date().toLocaleDateString();

/* LOAD EXPENSES */
const savedExpense = localStorage.getItem("expenseTotal");
if(savedExpense){
  document.getElementById("expenses").value = savedExpense;
}

/* CALCULATE */
function calculate(){

  const wdDays = +data.wdDays || 0;
  const weDays = +data.weDays || 0;
  const wdHours = +data.wdHours || 0;
  const wdOT = wdHours > (wdDays * 8) ? wdHours - (wdDays * 8) : 0;
  const weOT = +data.weOT || 0;

  const rates = {
    wd:240,
    we:280,
    wdOT:30,
    weOT:35,
    food:50
  };

  const foodDays = wdDays + weDays;

  const rows = [
    ["Weekdays", wdDays, rates.wd, wdDays*rates.wd],
    ["Weekend Days", weDays, rates.we, weDays*rates.we],
    ["Weekday OT (Hours)", wdOT, rates.wdOT, wdOT*rates.wdOT],
    ["Weekend OT (Hours)", weOT, rates.weOT, weOT*rates.weOT],
    ["Food Allowance", foodDays, rates.food, foodDays*rates.food]
  ];

  let total = 0;
  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  rows.forEach(r=>{
    total += r[3];

    tbody.innerHTML += `
    <tr>
      <td>${r[0]}</td>
      <td>${r[1]}</td>
      <td>$${r[2]}</td>
      <td>$${r[3].toFixed(2)}</td>
    </tr>`;
  });

  const expenses = +document.getElementById("expenses").value || 0;
  const cash = +document.getElementById("cash").value || 0;

  total += expenses;

  document.getElementById("final").innerText =
    "$" + (total - cash).toFixed(2);
}

/* NAV */
function goHome(){
  window.location.href = "timesheet.html";
}

function goExpenses(){
  window.location.href = "expenses.html";
}

</script>
