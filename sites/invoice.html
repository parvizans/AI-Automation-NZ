<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice</title>

<style>
body {
  font-family: Arial;
  color:#fff;
  margin:0;
  padding:20px;

  background:
    linear-gradient(rgba(11,18,32,0.8), rgba(11,18,32,0.8)),
    url("../assets/bg-Mexpenses.jpg") center/cover no-repeat;
}

.container {
  max-width:1000px;
  margin:auto;
}

h1 {
  color:#32d296;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td {
  padding:10px;
  text-align:center;
  border-bottom:1px solid #444;
}

input {
  padding:8px;
  border:none;
  border-radius:5px;
  width:100%;
}

button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.calc { background:#32d296; }
.reset { background:#e74c3c; }

.final-row {
  background:#2ecc71;
  color:#000;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>📄 Invoice</h1>

<!-- NAV -->
<div>
  <button onclick="goHome()">🏠 Timesheet</button>
  <button onclick="goExpenses()">💰 Expenses</button>
  <button onclick="goMaster()">📊 Master</button>
  <button onclick="saveInvoice()">💾 Save</button>
</div>

<!-- INFO -->
<p><strong>Company:</strong> AutomationPark LTD<br>
111 Queen Street, Auckland</p>

<p><strong>Engineer:</strong> <span id="engineerName"></span></p>
<p><strong>Project:</strong> <span id="projectName"></span></p>

<p><strong>Invoice No:</strong>
<input id="invoiceNo">
</p>

<p><strong>Expense No:</strong>
<input id="expenseNo">
</p>

<table>

<thead>
<tr>
  <th>Description</th>
  <th>Qty</th>
  <th>Rate</th>
  <th>Amount</th>
</tr>
</thead>

<tbody id="rows"></tbody>

<tr>
  <td colspan="3">Expenses</td>
  <td><input id="expenses" value="0"></td>
</tr>

<tr>
  <td colspan="3">Cash Advance</td>
  <td><input id="cash" value="0"></td>
</tr>

<tr class="final-row">
  <td colspan="3">Final Payable</td>
  <td id="final">$0.00</td>
</tr>

</table>

<button class="calc" onclick="calculateInvoice()">Calculate</button>
<button class="reset" onclick="resetInvoice()">Reset</button>

</div>

<script>

// =========================
// NAV
// =========================
function goHome(){ window.location.href="timesheet.html"; }
function goExpenses(){ window.location.href="expenses.html"; }
function goMaster(){ window.location.href="master-invoice.html"; }

// =========================
// SAVE
// =========================
function saveInvoice(){
  localStorage.setItem("invoiceNumber", invoiceNo.value);
  localStorage.setItem("expenseNumber", expenseNo.value);
  localStorage.setItem("invoiceExpenses", expenses.value);
}

// =========================
// BUILD + CALCULATE
// =========================
function calculateInvoice(){

  const data = JSON.parse(localStorage.getItem("invoiceData")) || {};

  const wdDays = Number(data.wdDays) || 0;
  const weDays = Number(data.weDays) || 0;
  const wdHours = Number(data.wdHours) || 0;
  const wdOT = Number(data.wdOT) || 0;
  const weOT = Number(data.weOT) || 0;

  const rates = {
    wd:240,
    we:280,
    wdHours:30,
    wdOT:30,
    weOT:35,
    food:50
  };

  const foodDays = wdDays + weDays;

  const rows = [
    ["Weekdays", wdDays, rates.wd, wdDays * rates.wd],
    ["Weekday Hours", wdHours, rates.wdHours, wdHours * rates.wdHours],
    ["Weekday OT", wdOT, rates.wdOT, wdOT * rates.wdOT],
    ["Weekend Days", weDays, rates.we, weDays * rates.we],
    ["Weekend OT", weOT, rates.weOT, weOT * rates.weOT],
    ["Food Allowance", foodDays, rates.food, foodDays * rates.food]
  ];

  let total = 0;
  rows.innerHTML = "";

  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  rows.forEach(r=>{
    total += r[3];
    tbody.innerHTML += `
      <tr>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
        <td>$${r[2]}</td>
        <td>$${r[3].toFixed(2)}</td>
      </tr>`;
  });

  const exp = Number(expenses.value) || 0;
  const cashVal = Number(cash.value) || 0;

  const final = total + exp - cashVal;

  document.getElementById("final").innerText =
    "$" + final.toFixed(2);
}

// =========================
// LOAD
// =========================
window.onload = function(){

  const data = JSON.parse(localStorage.getItem("invoiceData")) || {};

  engineerName.innerText = data.engineer || "";
  projectName.innerText = data.project || "";

  invoiceNo.value = localStorage.getItem("invoiceNumber") || "";
  expenseNo.value = localStorage.getItem("expenseNumber") || "";
  expenses.value = localStorage.getItem("invoiceExpenses") || 0;

  calculateInvoice();
}

// =========================
// LIVE UPDATE 🔥
// =========================
expenses.addEventListener("input", calculateInvoice);
cash.addEventListener("input", calculateInvoice);

// =========================
// RESET
// =========================
function resetInvoice(){

  expenses.value = 0;
  cash.value = 0;

  localStorage.removeItem("invoiceExpenses");

  calculateInvoice();

}

</script>

</body>
</html>
