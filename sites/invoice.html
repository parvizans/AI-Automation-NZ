<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice</title>

<style>
body {
  font-family: Arial;
  color:#fff;
  margin:0;
  padding:20px;

  background:
    linear-gradient(rgba(11,18,32,0.9), rgba(11,18,32,0.9)),
    url("assets/invoice-bg.jpg") center/cover no-repeat;
}

.container {
  max-width:1000px;
  margin:auto;
}

h1 {
  color:#32d296;
}

.top-nav {
  margin-bottom:20px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  margin-right:10px;
}

.btn-green { background:#32d296; color:#000; }
.btn-blue { background:#5aa7ff; color:#fff; }

.card {
  background:#1c2541;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:rgba(0,0,0,0.5);
}

th, td {
  padding:15px;
  border:1px solid rgba(255,255,255,0.1);
  text-align:center;
}

th {
  background:#111a33;
}

.final {
  background:#0f9d58;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="top-nav">
  <button onclick="goHome()">🏠 Timesheet</button>
  <button onclick="goExpenses()">💰 Expenses</button>
</div>

<h1>📄 Invoice</h1>

<div class="card">
<b id="name"></b><br>
<span id="project"></span><br>
Invoice #: <span id="inv"></span><br>
Date: <span id="date"></span>
</div>

<table>
<thead>
<tr>
<th>Description</th>
<th>Qty</th>
<th>Rate</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="rows"></tbody>

<tfoot>

<tr>
<td colspan="3">Expenses</td>
<td><input id="expenses" value="0"></td>
</tr>

<tr>
<td colspan="3">Cash Advance</td>
<td><input id="cash" value="0"></td>
</tr>

<tr class="final">
<td colspan="3">Final Payable</td>
<td id="final"></td>
</tr>

</tfoot>
</table>

<br>

<button class="btn-green" onclick="calculate()">Calculate</button>
<button class="btn-blue" onclick="window.print()">Print / Save PDF</button>

</div>

<script>

/* LOAD DATA */
const data = JSON.parse(localStorage.getItem("invoiceData")) || {};

document.getElementById("name").innerText = data.name || "";
document.getElementById("project").innerText = data.project || "";
document.getElementById("inv").innerText = data.invoiceNo || "";
document.getElementById("date").innerText = new Date().toLocaleDateString();

/* LOAD EXPENSES */
const savedExpense = localStorage.getItem("expenseTotal");
if(savedExpense){
  document.getElementById("expenses").value = savedExpense;
}

/* CALCULATE */
function calculate(){

  const wdDays = +data.wdDays || 0;
  const weDays = +data.weDays || 0;
  const wdOT = +data.wdHours - (wdDays*8) || 0;
  const weOT = +data.weOT || 0;

  const rates = {
    wd:240,
    we:280,
    wdOT:30,
    weOT:35,
    food:50
  };

  const foodDays = wdDays + weDays;

  const rows = [
    ["Weekdays", wdDays, rates.wd, wdDays*rates.wd],
    ["Weekend Days", weDays, rates.we, weDays*rates.we],
    ["Weekday OT", wdOT, rates.wdOT, wdOT*rates.wdOT],
    ["Weekend OT", weOT, rates.weOT, weOT*rates.weOT],
    ["Food Allowance", foodDays, rates.food, foodDays*rates.food]
  ];

  let total = 0;
  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  rows.forEach(r=>{
    total += r[3];

    tbody.innerHTML += `
    <tr>
      <td>${r[0]}</td>
      <td>${r[1]}</td>
      <td>$${r[2]}</td>
      <td>$${r[3].toFixed(2)}</td>
    </tr>`;
  });

  const expenses = +document.getElementById("expenses").value || 0;
  const cash = +document.getElementById("cash").value || 0;

  total += expenses;

  document.getElementById("final").innerText =
    "$" + (total - cash).toFixed(2);
}

/* NAV */
function goHome(){
  window.location.href = "timesheet.html";
}

function goExpenses(){
  window.location.href = "expenses.html";
}

</script>

</body>
</html>
