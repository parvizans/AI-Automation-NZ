<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice</title>

<style>
body {
  font-family: Arial;
  color:#fff;
  margin:0;
  padding:20px;

  background:
    linear-gradient(rgba(11,18,32,0.9), rgba(11,18,32,0.9)),
    url("../assets/invoice-bg-3.jpg") center/cover no-repeat;
}

/* CONTAINER */
.container {
  max-width:1000px;
  margin:auto;
}

/* HEADER GRID */
.header-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;  /* 👈 better balance */
  gap: 30px;                              /* 👈 more spacing */
  margin-bottom: 25px;
  align-items: end;                       /* 👈 align nicely */
}

.field label {
  display: block;
  margin-bottom: 8px;
  color: #aaa;
  font-size: 14px;
}

.field input,
.field select {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #2a355f;
  color: #fff;
}

/* TO + PROJECT */
.client-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 30px;              /* 🔥 more breathing space */
  margin-bottom: 25px;
  align-items: stretch;   /* 🔥 equal height boxes */
}
  #project {
  width: 100%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#2a355f;
  color:#fff;
}

.card {
  background:#1c2541;
  padding:20px;           /* 🔥 slightly bigger */
  border-radius:10px;
  height:100%;            /* 🔥 equal height */
}
  /* 👇 ADD HERE */
.card p {
  margin: 5px 0 0 0;
  line-height: 1.6;
}

/* NAV */
.top-nav {
  margin-bottom:20px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  margin-right:10px;
}

.btn-green { background:#32d296; color:#000; }
.btn-blue { background:#5aa7ff; color:#fff; }

.invoice-title {
  font-size:26px;          /* ↓ smaller */
  font-weight:bold;
  background:#2ecc71;
  color:#000;
  padding:8px 16px;        /* ↓ tighter */
  display:inline-block;
  border-radius:6px;       /* slightly smoother */
  float:right;
  margin-bottom:20px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:rgba(0,0,0,0.5);
}

th, td {
  padding:15px;
  border:1px solid rgba(255,255,255,0.1);
  text-align:center;
}

th {
  background:#111a33;
}

.final {
  background:#0f9d58;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

  <div class="field">

      <option value="">Select</option>
      <option value="abhignya.reddy@linkquestglobal.com">Abhignya Reddy</option>
      <option value="parviz.ansari@linkquestglobal.com">Parviz Ansari</option>
      <option value="pavinee.suwanta@linkquestglobal.com">Pavinee Suwanta</option>
      <option value="abhishek.ahirrao@linkquestglobal.com">Abhishek Ahirrao</option>
      <option value="sanjay.nampally@linkquestglobal.com">Sanjay Nampally</option>
      <option value="saidinesh.mogili@linkquestglobal.com">Sai Dinesh Mogili</option>
      <option value="manish.redekar@linkquestglobal.com">Manish Redekar</option>
      <option value="shivtejgasti@gmail.com">Shivtej Gasti</option>
      <option value="skofficial8991@gmail.com">Shreekant Kadam</option>
      <option value="ergaganverma@gmail.com">Gagan Verma</option>
    </select>
  </div>

  <div class="field">
    <label>Date</label>
    <input type="date" id="invoiceDate">
  </div>

</div>

<!-- TO + PROJECT -->
<div class="client-grid">

  <div class="card">
    <b>TO:</b><br>
    LINKQUEST TELECOM AUSTRALIA PTY LTD<br>
    LEVEL 5 NEXUS NORWEST
  </div>

  <div class="card">
    <b>Project</b><br>
    <input id="project" placeholder="Enter Project Name / Code">
    </select>
  </div>

</div>

<!-- NAV -->
<div class="top-nav">
  <button onclick="goHome()">🏠 Timesheet</button>
  <button onclick="goExpenses()">💰 Expenses</button>
</div>

<!-- TITLE -->
<h1 class="invoice-title">📄 INVOICE</h1>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Description</th>
<th>Qty</th>
<th>Rate</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="rows"></tbody>

<tfoot>

<tr>
<td colspan="3">Expenses</td>
<td><input id="expenses" value="0"></td>
</tr>

<tr>
<td colspan="3">Cash Advance</td>
<td><input id="cash" value="0"></td>
</tr>

<tr class="final">
<td colspan="3">Final Payable</td>
<td id="final"></td>
</tr>

</tfoot>
</table>

<br>

<button class="btn-green" onclick="calculate()">Calculate</button>
<button class="btn-blue" onclick="window.print()">Print / Save PDF</button>

</div>

<script>
const data = JSON.parse(localStorage.getItem("invoiceData")) || {};

// LOAD SAVED VALUES
function loadData(){
  const savedExpense = localStorage.getItem("expenseTotal");
  if(savedExpense){
    document.getElementById("expenses").value = savedExpense;
  }

  if(data.engineer){
    document.getElementById("engineer").value = data.engineer;
  }

  if(data.project){
    document.getElementById("project").value = data.project;
  }
}

// MAIN CALCULATION
function calculate(){

  const wdDays = +data.wdDays || 0;
  const weDays = +data.weDays || 0;
  const wdHours = +data.wdHours || 0;

  // ✅ OT LOGIC (CORRECT)
 const wdOT = Math.max(0, wdHours - (wdDays * 8));
  const weOT = +data.weOT || 0;

  const rates = {
    wd:240,
    we:280,
    wdOT:30,
    weOT:35,
    food:50
  };

  const foodDays = wdDays + weDays;

  const rows = [
    ["Weekdays", wdDays, rates.wd, wdDays*rates.wd],
    ["Weekday Hours", wdHours, hourlyRate, wdHours * hourlyRate]
    ["Weekend Days", weDays, rates.we, weDays*rates.we],
    ["Weekday OT", wdOT, rates.wdOT, wdOT*rates.wdOT],
    ["Weekend OT", weOT, rates.weOT, weOT*rates.weOT],
    
    ["Food Allowance", foodDays, rates.food, foodDays*rates.food]
  ];

  let total = 0;
  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  rows.forEach(r=>{
    total += r[3];

    tbody.innerHTML += `
    <tr>
      <td>${r[0]}</td>
      <td>${r[1]}</td>
      <td>$${r[2]}</td>
      <td>$${r[3].toFixed(2)}</td>
    </tr>`;
  });

  // INPUT VALUES
  const expenses = +document.getElementById("expenses").value || 0;
  const cash = +document.getElementById("cash").value || 0;

  // FINAL
  const finalTotal = total + expenses - cash;

  document.getElementById("final").innerText =
    "$" + finalTotal.toFixed(2);
}

// NAVIGATION
function goHome(){
  window.location.href = "timesheet.html";
}

function goExpenses(){
  window.location.href = "expenses.html";
}

// 🔥 AUTO LOAD + CALCULATE
window.addEventListener("load", function(){
  loadData();
  calculate();
});

// 🔥 LIVE UPDATE (SUPER NICE UX)
document.getElementById("expenses").addEventListener("input", calculate);
document.getElementById("cash").addEventListener("input", calculate);
  
</script>

</body>
</html>
