<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice</title>

<style>
body {
  font-family: Arial;
  color:#fff;
  margin:0;
  padding:20px;

  background:
    linear-gradient(rgba(11,18,32,0.9), rgba(11,18,32,0.9)),
    url("../assets/bg-Mexpenses.jpg") center/cover no-repeat;
}

.container {
  max-width:1000px;
  margin:auto;
}

h1 {
  color:#32d296;
  margin-bottom:20px;
}
  <div style="margin-bottom:20px;">

  <button onclick="goHome()">🏠 Timesheet</button>
  <button onclick="goExpenses()">💰 Expenses</button>
  <button onclick="goMaster()">📊 Master Invoice</button>
  <button onclick="saveInvoice()">💾 Save</button>

</div>
  <div style="margin-bottom:20px;">

  <p><strong>Company:</strong> AutomationPark LTD<br>
  111 Queen Street, Auckland, New Zealand</p>

  <p><strong>Engineer:</strong> <span id="engineerName"></span></p>
  <p><strong>Project:</strong> <span id="projectName"></span></p>

  <p><strong>Invoice No:</strong>
    <input id="invoiceNo" placeholder="INV-001">
  </p>

  <p><strong>Expense No:</strong>
    <input id="expenseNo" placeholder="EXP-001">
  </p>

</div>

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td {
  padding:12px;
  border-bottom:1px solid #333;
  text-align:center;
}

th {
  background:#1c2541;
}

input {
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
  background:#2a355f;
  color:#fff;
}

/* FINAL ROW */
.final-row {
  background:#2ecc71;
  color:#000;
  font-weight:bold;
}

/* BUTTONS */
.buttons {
  margin-top:20px;
}

button {
  padding:10px 20px;
  margin-right:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.calc { background:#32d296; }
.reset { background:#e74c3c; }

</style>
</head>

<body>

<div class="container">

<h1>📄 Invoice</h1>

<table>

<thead>
<tr>
  <th>Description</th>
  <th>Qty</th>
  <th>Rate</th>
  <th>Amount</th>
</tr>
</thead>

<tbody id="rows">
</tbody>

<tr>
  <td colspan="3">Expenses</td>
  <td><input id="expenses" placeholder="0"></td>
</tr>

<tr>
  <td colspan="3">Cash Advance</td>
  <td><input id="cash" placeholder="0"></td>
</tr>

<tr class="final-row">
  <td colspan="3">Final Payable</td>
  <td id="final">$0.00</td>
</tr>

</table>

<div class="buttons">
  <button class="calc" onclick="calculate()">Calculate</button>
  <button class="reset" onclick="resetInvoice()">Reset</button>
</div>

</div>

<script>

// =========================
// NAVIGATION
// =========================
function goHome(){
  window.location.href = "timesheet.html";
}

function goExpenses(){
  window.location.href = "expenses.html";
}

function goMaster(){
  window.location.href = "master-invoice.html";
}

// =========================
// SAVE INVOICE
// =========================
function saveInvoice(){

  const invNo = document.getElementById("invoiceNo").value;
  const expNo = document.getElementById("expenseNo").value;

  localStorage.setItem("invoiceNumber", invNo);
  localStorage.setItem("expenseNumber", expNo);

  console.log("Invoice saved ✅");
}

// =========================
// BUILD ROWS (if not already)
// =========================
function buildRows(){

  const data = JSON.parse(localStorage.getItem("invoiceData")) || {};

  const wdDays = Number(data.wdDays) || 0;
  const weDays = Number(data.weDays) || 0;
  const wdHours = Number(data.wdHours) || 0;
  const wdOT = Number(data.wdOT) || 0;
  const weOT = Number(data.weOT) || 0;
  const foodTotal = Number(data.foodTotal) || 0;

  const rates = {
    wd:240,
    we:280,
    wdHours:30,
    wdOT:30,
    weOT:35,
    food:50
  };

  const rows = [
    ["Weekdays", wdDays, rates.wd, wdDays * rates.wd],
    ["Weekday Hours", wdHours, rates.wdHours, wdHours * rates.wdHours],
    ["Weekday OT", wdOT, rates.wdOT, wdOT * rates.wdOT],
    ["Weekend Days", weDays, rates.we, weDays * rates.we],
    ["Weekend OT", weOT, rates.weOT, weOT * rates.weOT],
    ["Food Allowance", foodTotal, rates.food, foodTotal * rates.food]
  ];

  let total = 0;
  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  rows.forEach(r=>{
    total += r[3];

    tbody.innerHTML += `
    <tr>
      <td>${r[0]}</td>
      <td>${r[1]}</td>
      <td>$${r[2]}</td>
      <td>$${r[3].toFixed(2)}</td>
    </tr>`;
  });

  const expenses = Number(document.getElementById("expenses").value) || 0;
  const cash = Number(document.getElementById("cash").value) || 0;

  const finalTotal = total + expenses - cash;

  document.getElementById("final").innerText =
    "$" + finalTotal.toFixed(2);
}

// =========================
// LOAD EVERYTHING
// =========================
window.addEventListener("load", function(){

  // 🚫 kill old bug value
  localStorage.removeItem("expenseTotal");

  const savedExp = localStorage.getItem("invoiceExpenses");
  if(savedExp){
    document.getElementById("expenses").value = savedExp;
  }

  const data = JSON.parse(localStorage.getItem("invoiceData")) || {};

  if(data.engineer){
    document.getElementById("engineerName").innerText = data.engineer;
  }

  if(data.project){
    document.getElementById("projectName").innerText = data.project;
  }

  const invNo = localStorage.getItem("invoiceNumber");
  const expNo = localStorage.getItem("expenseNumber");

  if(invNo){
    document.getElementById("invoiceNo").value = invNo;
  }

  if(expNo){
    document.getElementById("expenseNo").value = expNo;
  }

  buildRows();
});

// =========================
// RESET (SAFE)
// =========================
function resetInvoice(){

  localStorage.removeItem("invoiceExpenses");

  document.getElementById("expenses").value = "";
  document.getElementById("cash").value = "";
  document.getElementById("final").innerText = "$0.00";

  buildRows();

  console.log("Invoice reset ✅");
}

</script>
</body>
</html>
