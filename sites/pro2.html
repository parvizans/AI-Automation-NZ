<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Timesheet Pro-2</title>

<style>
body {
  font-family: Arial;
  color:#fff;
  margin:0;
  padding:20px;

  background:
    linear-gradient(rgba(11,18,32,0.9), rgba(11,18,32,0.9)),
    url("../assets/bg-Mexpenses.jpg") center/cover no-repeat;
}

.container {
  max-width:1200px;
  margin:auto;
}

h1 {
  color:#32d296;
}

.section {
  background: rgba(0,0,0,0.6);
  padding:20px;
  margin-top:20px;
  border-radius:10px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #333;
  text-align:center;
}

input {
  padding:8px;
  border:none;
  border-radius:5px;
  width:90%;
}

button {
  padding:8px 15px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.green { background:#2ecc71; }
.red { background:#e74c3c; }
.blue { background:#3498db; }
.orange { background:#f39c12; }

.final {
  background:#2ecc71;
  color:#000;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Smart Timesheet Pro-2</h1>

<!-- ========================= -->
<!-- TIMESHEET -->
<!-- ========================= -->
<div class="section" id="timesheet">

<h2>Timesheet</h2>

<button class="blue" onclick="goExpenses()">Go Expenses</button>
<button class="blue" onclick="goInvoice()">Go Invoice</button>

<table>
<tr>
<th>Day</th>
<th>Hours</th>
<th>OT</th>
<th>SDR</th>
</tr>

<tbody id="timesheetRows"></tbody>
</table>

</div>

<!-- ========================= -->
<!-- EXPENSES -->
<!-- ========================= -->
<div class="section" id="expenses">

<h2>Expenses</h2>

<button class="blue" onclick="goTimesheet()">Go Timesheet</button>
<button class="blue" onclick="goInvoice()">Go Invoice</button>

<input id="expensesInput" placeholder="Enter Expenses">

</div>

<!-- ========================= -->
<!-- INVOICE -->
<!-- ========================= -->
<div class="section" id="invoice">

<h2>Invoice</h2>

<button class="blue" onclick="goTimesheet()">Go Timesheet</button>
<button class="blue" onclick="goExpenses()">Go Expenses</button>

<table>
<tr>
<th>Description</th>
<th>Amount</th>
</tr>

<tr><td>Total Hours</td><td id="hoursTotal">0</td></tr>
<tr><td>Total OT</td><td id="otTotal">0</td></tr>
<tr><td>Expenses</td><td id="expTotal">0</td></tr>

<tr>
<td>Cash Advance</td>
<td><input id="cashInput" placeholder="0"></td>
</tr>

<tr class="final">
<td>Final Payable</td>
<td id="final">$0</td>
</tr>

</table>

<button class="green" onclick="calculate()">Calculate</button>
<button class="red" onclick="resetAll()">Reset</button>

</div>

</div>

<script>

// =========================
// BUILD TIMESHEET
// =========================
const tbody = document.getElementById("timesheetRows");

for(let i=1;i<=30;i++){
  tbody.innerHTML += `
  <tr>
    <td>${i}</td>
    <td><input class="hours"></td>
    <td><input class="ot"></td>
    <td><button class="orange">SDR</button></td>
  </tr>`;
}

// =========================
// NAVIGATION (SCROLL)
// =========================
function goTimesheet(){
  document.getElementById("timesheet").scrollIntoView({behavior:"smooth"});
}

function goExpenses(){
  document.getElementById("expenses").scrollIntoView({behavior:"smooth"});
}

function goInvoice(){
  document.getElementById("invoice").scrollIntoView({behavior:"smooth"});
}

// =========================
// CALCULATION
// =========================
function calculate(){

  let totalHours = 0;
  let totalOT = 0;

  document.querySelectorAll(".hours").forEach(e=>{
    totalHours += Number(e.value) || 0;
  });

  document.querySelectorAll(".ot").forEach(e=>{
    totalOT += Number(e.value) || 0;
  });

  const expenses = Number(document.getElementById("expensesInput").value) || 0;
  const cash = Number(document.getElementById("cashInput").value) || 0;

  document.getElementById("hoursTotal").innerText = totalHours;
  document.getElementById("otTotal").innerText = totalOT;
  document.getElementById("expTotal").innerText = expenses;

  const final = (totalHours * 30) + (totalOT * 35) + expenses - cash;

  document.getElementById("final").innerText = "$" + final.toFixed(2);
}

// =========================
// RESET
// =========================
function resetAll(){

  document.querySelectorAll("input").forEach(i=>i.value="");
  document.getElementById("final").innerText="$0";

}

</script>

</body>
</html>
