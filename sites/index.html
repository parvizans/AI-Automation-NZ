<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>5G Link Budget Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📡 5G Link Budget Calculator</h1>

  <div class="grid">

    <input id="power" type="number" placeholder="Sector Power (W)" value="100">

    <select id="tdd">
      <option value="4">4DL_1UL</option>
      <option value="3">3DL_2UL</option>
    </select>

    <input id="bodyLoss" type="number" placeholder="Body Loss (dB)" value="3">
    <input id="buildingLoss" type="number" placeholder="Building Loss (dB)" value="12">
    <input id="interference" type="number" placeholder="Interference Margin (dB)" value="2">

    <select id="model">
      <option value="120">Rural</option>
      <option value="135">Suburban</option>
      <option value="150">Urban</option>
    </select>

    <input id="vegetation" type="number" placeholder="Vegetation Loss (dB)" value="0">
    <input id="antennaGain" type="number" placeholder="BS Antenna Gain (dBi)" value="17">
    <input id="frequency" type="number" placeholder="Frequency (MHz)" value="3500">
    <input id="bandwidth" type="number" placeholder="Bandwidth (MHz)" value="100">
    <input id="cableLoss" type="number" placeholder="Cable Loss (dB)" value="0">

    <select id="numerology">
      <option value="1">15 kHz</option>
      <option value="2" selected>30 kHz</option>
      <option value="3">60 kHz</option>
    </select>

    <input id="fading" type="number" placeholder="Fading Margin (dB)" value="8">

    <select id="radio">
      <option value="2">RRU</option>
      <option value="3">MMU</option>
      <option value="4">MRFU</option>
    </select>

    <input id="area" type="number" placeholder="Area (sqkm)" value="50">

  </div>

  <button onclick="calculate()">⚡ Calculate</button>

  <div class="result">
    <h2>📊 Results</h2>
    <p id="distance">Cell Edge Distance: -</p>
    <p id="pathloss">Path Loss: -</p>
    <p id="summary">Summary: -</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
