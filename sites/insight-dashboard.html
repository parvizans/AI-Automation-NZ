<head>
<meta charset="UTF-8">
<title>Network Insight Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  margin:0;
  padding:20px;
}

.container {
  max-width:1400px;
  margin:auto;
}

h1 {
  color:#32d296;
  margin-bottom:20px;
}

/* KPI */
.kpi-grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin-bottom:30px;
}

.card {
  background: linear-gradient(145deg, #1c2541, #141b2d);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.card h2 {
  color:#32d296;
}

/* NEW CHART GRID */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.chart-card {
  background: #1c2541;
  padding: 15px;
  border-radius: 12px;
}

/* ALERTS */
.alerts {
  margin-top:30px;
  background:#2a1a1a;
  padding:15px;
  border-radius:10px;
}

.alert {
  color:#ff6b6b;
}
</style>
</head>
<body>

<div class="container">

<h1>📡 Network Insight Dashboard</h1>

<!-- Upload -->
<input type="file" id="fileInput" accept=".csv">



<!-- Filters -->
<select id="siteFilter">...</select>
  
<!-- KPI CARDS -->
<div class="kpi-grid">
  <div class="card">
  <h2 id="throughput">--</h2>
    <p>Throughput</p>
  </div>
  <div class="card">
    <h2 id="rsrp">-95 dBm</h2>
    <p>RSRP</p>
  </div>
  <div class="card">
    <h2 id="rsrq">-10 dB</h2>
    <p>RSRQ</p>
  </div>
  <div class="card">
    <h2 id="sinr">18 dB</h2>
    <p>SINR</p>
  </div>
  <div class="card">
    <h2 id="drop">2%</h2>
    <p>Drop Rate</p>
  </div>


<!-- CHARTS -->
<div class="charts-grid"></div>


  <div class="alerts">
    <h3>🚨 Network Alerts</h3>
    <div class="alert">⚠ High drop rate detected in Sector A</div>
    <div class="alert">⚠ SINR degradation observed</div>
  </div>
</div>
  
<script src="dashboard.js"></script>
<script src="dashboard.js?v=2"></script>
</body>
</html>
