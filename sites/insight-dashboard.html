<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Network Insight Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  margin:0;
  padding:20px;
}

.container {
  max-width:1400px;
  margin:auto;
}

h1 {
  color:#32d296;
  margin-bottom:20px;
}

/* Upload */
.upload-box {
  margin-bottom: 20px;
}

.upload-btn {
  display: inline-block;
  padding: 10px 20px;
  background: #32d296;
  color: #000;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

#fileInput {
  display: none;
}

/* KPI */
.kpi-grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin-bottom:30px;
}

.card {
  background: linear-gradient(145deg, #1c2541, #141b2d);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.card h2 {
  color:#32d296;
}

/* Charts */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.chart-card {
  background: #1c2541;
  padding: 15px;
  border-radius: 12px;
}

/* Alerts */
.alerts {
  margin-top:30px;
  background:#2a1a1a;
  padding:15px;
  border-radius:10px;
}

.alert {
  color:#ff6b6b;
}
</style>
</head>

<body>

<div class="container">

<h1>📡 Network Insight Dashboard</h1>

<!-- Upload -->
<div class="upload-box">
  <label for="fileInput" class="upload-btn">📂 Upload CSV</label>
  <input type="file" id="fileInput" accept=".csv">
</div>

<!-- KPI -->
<div class="kpi-grid">
  <div class="card"><h2 id="throughput">--</h2><p>Throughput</p></div>
  <div class="card"><h2 id="rsrp">--</h2><p>RSRP</p></div>
  <div class="card"><h2 id="rsrq">--</h2><p>RSRQ</p></div>
  <div class="card"><h2 id="sinr">--</h2><p>SINR</p></div>
  <div class="card"><h2 id="drop">--</h2><p>Drop Rate</p></div>
</div>

<!-- Charts -->
<div class="charts-grid"></div>

<!-- Alerts -->
<div class="alerts">
  <h3>🚨 Network Insights</h3>
</div>

</div>

<script src="dashboard.js?v=3"></script>

</body>
</html>
