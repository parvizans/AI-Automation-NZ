<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutomationPark Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: #fff;
  padding: 20px;
}

h1 {
  color: #32d296;
}

/* FILTERS */
.filters-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
}

.filter-card {
  background: #1c2541;
  padding: 10px;
  border-radius: 10px;
  min-width: 150px;
}

.filter-card select {
  width: 100%;
  background: #2a355f;
  color: #fff;
  border: none;
  padding: 5px;
}

/* KPI */
.kpi-grid {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.kpi {
  background: #1c2541;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
  text-align: center;
}

/* CHART */
.chart-container {
  background: #1c2541;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🚀 AutomationPark Dashboard</h1>

<input type="file" id="fileInput">

<div id="filters" class="filters-grid"></div>

<div class="kpi-grid"></div>

<div class="charts-grid"></div>
  
<script src="dashboard_v2.js"></script>


</body>
</html>
