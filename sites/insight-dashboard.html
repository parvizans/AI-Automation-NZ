<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Network Insight Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  margin:0;
  padding:20px;
}

.container {
  max-width:1400px;
  margin:auto;
}

h1 {
  color:#32d296;
  margin-bottom:20px;
}

/* KPI CARDS */
.kpi-grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin-bottom:30px;
}

.card {
  background:#1c2541;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.card h2 {
  margin:0;
  font-size:22px;
}

.card p {
  margin:5px 0;
  color:#aaa;
}

/* CHARTS */
.chart-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.chart-box {
  background:#1c2541;
  padding:15px;
  border-radius:10px;
}

/* ALERTS */
.alerts {
  margin-top:30px;
  background:#2a1a1a;
  padding:15px;
  border-radius:10px;
}

.alert {
  color:#ff6b6b;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📡 Network Insight Dashboard</h1>

<!-- Upload -->
<input type="file" id="fileInput" accept=".csv,.txt,.xlsx,.xls">
<button onclick="loadData()">Upload CSV</button>

<!-- Filters -->
<select id="siteFilter">...</select>
  
<!-- KPI CARDS -->
<div class="kpi-grid">
  <div class="card">
    <h2 id="throughput">85 Mbps</h2>
    <p>Throughput</p>
  </div>
  <div class="card">
    <h2 id="rsrp">-95 dBm</h2>
    <p>RSRP</p>
  </div>
  <div class="card">
    <h2 id="rsrq">-10 dB</h2>
    <p>RSRQ</p>
  </div>
  <div class="card">
    <h2 id="sinr">18 dB</h2>
    <p>SINR</p>
  </div>
  <div class="card">
    <h2 id="drop">2%</h2>
    <p>Drop Rate</p>
  </div>
</div>

<!-- CHARTS -->
<div id="chartContainer" class="chart-grid"></div>
  <div class="chart-box">
    <canvas id="throughputChart"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="signalChart"></canvas>
  </div>
</div>

<!-- ALERTS -->
<div class="alerts">
  <h3>🚨 Network Alerts</h3>
  <div class="alert">⚠ High drop rate detected in Sector A</div>
  <div class="alert">⚠ SINR degradation observed</div>
</div>

</div>
 
  
</div>  <!-- FIXED closing div -->

<script>

  
  // =======================
 //   Detect KPI VARIABLES
// =======================

  function detectKPIs(headers) {

  return headers.filter(h => {
    const name = h.toLowerCase();

    return (
      name.includes("throughput") ||
      name.includes("rsrp") ||
      name.includes("rsrq") ||
      name.includes("sinr") ||
      name.includes("snir") ||
      name.includes("drop") ||
      name.includes("traffic") ||
      name.includes("availability")
    );
  });
}
   // =======================
 //   Auto Generate Charts
// =======================
  function generateCharts(kpis) {

  const container = document.getElementById("chartContainer");
  container.innerHTML = "";

  kpis.forEach((kpi, index) => {

    const box = document.createElement("div");
    box.className = "chart-box";

    const canvas = document.createElement("canvas");
    canvas.id = "chart_" + index;

    box.appendChild(canvas);
    container.appendChild(box);

    let dataIndex = getIndex(kpi);

    let chartData = rawData.map(row => Number(row[dataIndex]));
    let labels = rawData.map((_, i) => i + 1);

    new Chart(canvas, {
      type: getChartType(kpi),
      data: {
        labels: labels,
        datasets: [{
          label: kpi,
          data: chartData
        }]
      }
    });

  });
}

   // =======================
 //   Auto Generate Charts Types
// =======================
  
  function getChartType(kpi) {

  const name = kpi.toLowerCase();

  if (name.includes("drop")) return "bar";
  if (name.includes("availability")) return "line";
  if (name.includes("traffic")) return "bar";
  if (name.includes("throughput")) return "line";

  return "line"; // default
}

// =======================
// GLOBAL VARIABLES
// =======================
let rawData = [];
let headers = [];
let currentIndustry = "unknown";
let throughputChart, signalChart;


// =======================
// INIT CHARTS AFTER LOAD
// =======================
window.onload = function() {

  throughputChart = new Chart(document.getElementById("throughputChart"), {
    type: "line",
    data: { labels: [], datasets: [{ label: "Throughput", data: [] }] }
  });

  signalChart = new Chart(document.getElementById("signalChart"), {
    type: "line",
    data: { labels: [], datasets: [{ label: "Signal", data: [] }] }
  });

};


// =======================
// LOAD FILE
// =======================
function loadData() {

  const input = document.getElementById("fileInput");

  if (!input.files.length) {
    alert("Please select a file first!");
    return;
  }

  const file = input.files[0];
  const fileName = file.name.toLowerCase();

  if (fileName.endsWith(".csv") || fileName.endsWith(".txt")) {

    const reader = new FileReader();

    reader.onload = function(e) {
      processTextData(e.target.result);
    };

    reader.readAsText(file);

  } else {
    alert("Only CSV/TXT supported for now");
  }
}


// =======================
// PROCESS DATA
// =======================
function processTextData(text) {

  const rows = text.split("\n");

  headers = rows[0].split(",");

  let kpis = detectKPIs(headers);
   generateCharts(kpis);

  currentIndustry = detectIndustry(headers);
  console.log("Detected:", currentIndustry);

  rawData = rows
    .slice(1)
    .filter(r => r.trim() !== "")
    .map(r => r.split(","));

  calculateKPI();
  updateCharts();
}


// =======================
// INDUSTRY DETECTION
// =======================
function detectIndustry(headers) {

  const h = headers.join(" ").toLowerCase();

  if (
    h.includes("rsrp") ||
    h.includes("rsrq") ||
    h.includes("sinr") ||
    h.includes("snir") ||
    h.includes("throughput") ||
    h.includes("drop")
  ) return "telecom";

  return "unknown";
}


// =======================
// FIND COLUMN INDEX
// =======================
function getIndex(name) {
  return headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));
}


// =======================
// KPI CALCULATION
// =======================
function calculateKPI() {

  if (currentIndustry !== "telecom") return;

  let thr = getIndex("throughput");
  let rsrp = getIndex("rsrp");
  let rsrq = getIndex("rsrq");
  let sinr = getIndex("sinr") !== -1 ? getIndex("sinr") : getIndex("snir");
  let drop = getIndex("drop");

  let t=0, r1=0, r2=0, s=0, d=0, c=0;

  rawData.forEach(row => {
    t += Number(row[thr]);
    r1 += Number(row[rsrp]);
    r2 += Number(row[rsrq]);
    s += Number(row[sinr]);
    d += Number(row[drop]);
    c++;
  });

  document.getElementById("throughput").innerText = (t/c).toFixed(0) + " Mbps";
  document.getElementById("rsrp").innerText = (r1/c).toFixed(0) + " dBm";
  document.getElementById("rsrq").innerText = (r2/c).toFixed(0) + " dB";
  document.getElementById("sinr").innerText = (s/c).toFixed(0) + " dB";
  document.getElementById("drop").innerText = (d/c).toFixed(2) + " %";
}


// =======================
// UPDATE CHARTS
// =======================
function updateCharts() {

  let thr = getIndex("throughput");
  let sinr = getIndex("sinr") !== -1 ? getIndex("sinr") : getIndex("snir");

  const labels = rawData.map((_, i) => i + 1);
  const thrData = rawData.map(r => Number(r[thr]));
  const sinrData = rawData.map(r => Number(r[sinr]));

  throughputChart.data.labels = labels;
  throughputChart.data.datasets[0].data = thrData;
  throughputChart.update();

  signalChart.data.labels = labels;
  signalChart.data.datasets[0].data = sinrData;
  signalChart.update();
}

</script>

</body>
</html>

</script>

</body>
</html>
