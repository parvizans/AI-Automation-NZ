<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>AutomationPark Dashboard</title>

<!-- =====================================
LIBRARIES
===================================== -->

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>

=====================================
STYLE
===================================== 

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:
    "Segoe UI",
    sans-serif;

  background:
    linear-gradient(
      rgba(2,6,23,0.92),
      rgba(2,6,23,0.94)
    ),
    url("assets/Hero-4.jpg");

  background-size:cover;
  background-position:center;

  color:white;

  min-height:100vh;

  overflow-x:hidden;
}

/* =========================
   MAIN LAYOUT
========================= */

.dashboard-layout{

  display:flex;

  gap:20px;

  padding:20px;

}

/* =========================
   SIDEBAR
========================= */

.sidebar{

  width:280px;

  background:
    rgba(2,6,23,0.92);

  border:
    1px solid rgba(255,255,255,0.08);

  border-radius:24px;

  padding:22px;

  backdrop-filter:blur(14px);

  position:sticky;

  top:20px;

  height:fit-content;

  box-shadow:
    0 0 30px rgba(0,0,0,0.45);

}

.sidebar h2{

  color:#60a5fa;

  margin-bottom:24px;

  font-size:34px;

}

/* =========================
   CONTROLS
========================= */

.sidebar label{

  display:block;

  margin-top:18px;

  margin-bottom:8px;

  color:#cbd5e1;

  font-size:14px;

}

.sidebar select,
.sidebar input{

  width:100%;

  padding:12px;

  border-radius:12px;

  border:none;

  background:
    rgba(30,41,59,0.85);

  color:white;

  font-size:14px;

}

/* =========================
   BUTTONS
========================= */

button{

  border:none;

  cursor:pointer;

}

.export-btn{

  width:100%;

  margin-top:20px;

  padding:14px;

  border-radius:14px;

  background:#2563eb;

  color:white;

  font-size:15px;

  font-weight:600;

  transition:0.3s;

}

.export-btn:hover{

  transform:translateY(-2px);

  background:#1d4ed8;

}
  <div class="network-panel">

  <button class="network-btn">
    All Network
  </button>

  <button class="network-btn">
    5G
  </button>

  <button class="network-btn">
    4G
  </button>

  <button class="network-btn">
    3G
  </button>

</div>

/* =========================
   TELECOM PANEL
========================= */

.network-panel{

  margin-top:28px;

  display:flex;

  flex-direction:column;

  gap:12px;

}

.network-btn{

  background:
    rgba(15,23,42,0.92);

  border:
    1px solid rgba(239,68,68,0.7);

  color:white;

  padding:14px;

  border-radius:14px;

  font-size:14px;

  font-weight:600;

  transition:0.3s;

}

.network-btn:hover{

  background:#ef4444;

  transform:translateY(-2px);

  box-shadow:
    0 0 15px rgba(239,68,68,0.45);

}

/* =========================
   MAIN CONTENT
========================= */

.main-content{

  flex:1;

}

/* =========================
   HEADER
========================= */

.dashboard-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:24px;

  gap:20px;

}

.dashboard-title{

  font-size:52px;

  font-weight:800;

  color:white;

}

.timeline-panel{

  display:flex;

  gap:14px;

  align-items:center;

  background:
    rgba(15,23,42,0.92);

  padding:14px 18px;

  border-radius:18px;

  border:
    1px solid rgba(255,255,255,0.08);

}

.timeline-chip{

  padding:10px 16px;

  border-radius:12px;

  background:
    rgba(37,99,235,0.18);

  color:#93c5fd;

  font-size:13px;

}
  <div class="dashboard-header">

  <h1 class="dashboard-title">
    🚀 AutomationPark Dashboard
  </h1>

  <div class="timeline-panel">

    <div class="timeline-chip">
      Daily
    </div>

    <div class="timeline-chip">
      RCA Ready
    </div>

    <div class="timeline-chip">
      GeoAI Enabled
    </div>

  </div>

</div>

/* =========================
   FILTERS
========================= */

#filters{

  display:grid;

  grid-template-columns:
    repeat(auto-fill,minmax(180px,1fr));

  gap:14px;

  margin-bottom:24px;

}

.filter-box{

  background:
    rgba(15,23,42,0.9);

  padding:14px;

  border-radius:16px;

  border:
    1px solid rgba(255,255,255,0.05);

}

.filter-box label{

  display:block;

  margin-bottom:10px;

  color:#cbd5e1;

  font-size:13px;

}

.filter-box select{

  width:100%;

  min-height:120px;

  border:none;

  border-radius:12px;

  background:
    rgba(2,6,23,0.92);

  color:white;

  padding:10px;

}

/* =========================
   KPI GRID
========================= */

.kpi-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

  gap:18px;

  margin-bottom:28px;

}

.kpi-card{

  background:
    linear-gradient(
      135deg,
      rgba(15,23,42,0.95),
      rgba(30,41,59,0.92)
    );

  border:
    1px solid rgba(255,255,255,0.06);

  border-radius:22px;

  padding:24px;

  transition:0.3s;

  box-shadow:
    0 0 20px rgba(0,0,0,0.25);

}

.kpi-card:hover{

  transform:translateY(-4px);

  box-shadow:
    0 0 20px rgba(37,99,235,0.28);

}

.kpi-card h3{

  color:#94a3b8;

  font-size:15px;

  margin-bottom:14px;

}

.kpi-card p{

  font-size:42px;

  font-weight:800;

  color:#60a5fa;

}

/* =========================
   CHART GRID
========================= */

.charts-grid{

  display:grid;

  grid-template-columns:
    repeat(2, minmax(0,1fr));

  gap:24px;

}

/* =========================
   CHART BOX
========================= */

.chart-box{

  background:
    rgba(10,15,35,0.92);

  border:
    1px solid rgba(255,255,255,0.08);

  border-radius:24px;

  padding:18px;

  min-height:480px;

  position:relative;

  backdrop-filter:blur(8px);

  box-shadow:
    0 0 25px rgba(0,0,0,0.35);

}

.chart-box canvas{

  width:100% !important;

  height:360px !important;

}

/* =========================
   CHART HEADER
========================= */

.chart-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:14px;

}

.kpi-title-group{

  display:flex;

  flex-direction:column;

  gap:5px;

}

.kpi-main{

  font-size:16px;

  font-weight:700;

  color:white;

}

.kpi-secondary{

  font-size:12px;

  color:#38bdf8;

}

/* =========================
   CHART SELECTOR
========================= */

.chart-selector{

  margin-bottom:12px;

  padding:10px;

  border:none;

  border-radius:12px;

  background:
    rgba(30,41,59,0.9);

  color:white;

}

/* =========================
   RAC PANEL
========================= */

#rac-results{

  margin-top:30px;

  display:grid;

  gap:16px;

}

.rac-card{

  background:
    rgba(15,23,42,0.92);

  border:
    1px solid rgba(56,189,248,0.15);

  border-radius:18px;

  padding:18px;

  color:#e2e8f0;

}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:1400px){

  .charts-grid{

    grid-template-columns:1fr;

  }

}

@media(max-width:1000px){

  .dashboard-layout{

    flex-direction:column;

  }

  .sidebar{

    width:100%;

    position:relative;

    top:0;

  }

}

</style>

</head>

<body>
  
<div class="main-container">

<div class="content">

  <div class="sidebar">

  <h2>🧠 Control</h2>

  <div class="side-group">

    <label>Granularity</label>

    <select>
      <option>Daily</option>
      <option>Weekly</option>
      <option>Monthly</option>
    </select>

  </div>

  <div class="side-group">

    <label>Smoothing</label>

    <select>
      <option>OFF</option>
      <option>ON</option>
    </select>

  </div>

  <div class="side-group">

    <label>Top Sites</label>

    <input type="number" value="20">

  </div>

  <button class="export-btn">
    Export Report
  </button>

</div>

<!-- =====================================
TOP RIBBON
===================================== -->

<div class="top-ribbon"></div>

<!-- =====================================
HERO PANEL
===================================== -->

<div class="hero-panel">

  <h1>🚀 AutomationPark Dashboard</h1>

  <div class="top-controls">

    <input
      type="file"
      id="fileInput"
    >

    <input
      type="number"
      id="limitInput"
      value="20"
      placeholder="Points Limit"
    >

  </div>

</div>

<!-- =====================================
FILTERS
===================================== -->

<div id="filters" class="filters-grid"></div>

<!-- =====================================
KPI CARDS
===================================== -->

<div class="kpi-grid"></div>

<!-- =====================================
CHARTS
===================================== -->

<div class="charts-grid"></div>

<!-- =====================================
RCA RESULTS
===================================== -->

<div id="rac-results"></div>

<!-- =====================================
JS FILE
===================================== -->

<script src="dashboard.js"></script>

</div>
</div>

</body>

</html>
