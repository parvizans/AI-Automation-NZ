<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>AutomationPark Dashboard</title>

<!-- =====================================
LIBRARIES
===================================== -->

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>

<!-- =====================================
STYLE
===================================== -->

<style>

/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(5,10,25,0.82), rgba(5,10,25,0.9)),
    url("../assets/Hero-4.jpg") center/cover no-repeat fixed;

  color:white;
  overflow-x:hidden;
}

/* =========================
   MAIN LAYOUT
========================= */

.main-container{
  display:flex;
  min-height:100vh;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
  width:260px;
  background:#0f172a;
  padding:20px;
  position:fixed;
  top:0;
  left:0;
  height:100vh;
  overflow-y:auto;
  border-right:1px solid rgba(255,255,255,0.05);
  z-index:100;
}

.sidebar h2{
  margin-bottom:25px;
  color:#60a5fa;
}

.sidebar label{
  display:block;
  margin:15px 0 6px;
  font-size:13px;
  color:#cbd5e1;
}

.sidebar select,
.sidebar input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
}

.export-btn{
  margin-top:20px;
  width:100%;
}

/* =========================
   CONTENT
========================= */

.content{
  margin-left:260px;
  width:calc(100% - 260px);
  padding:25px;
}

/* =========================
   HERO
========================= */

.hero-panel{
  margin-bottom:25px;
}

.hero-panel h1{
  font-size:42px;
  margin-bottom:20px;
}

.top-controls{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.top-controls input{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

/* =========================
   FILTERS
========================= */

.filters-grid{
  display:grid;
  grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

  gap:15px;
  margin-bottom:25px;
}

.filters-grid select{
  width:100%;
  min-height:120px;
  background:#111827;
  color:white;
  border:none;
  border-radius:12px;
  padding:10px;
}

/* =========================
   KPI GRID
========================= */

.kpi-grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

  gap:18px;

  margin-bottom:30px;
}

.kpi-card{
  background:#111827;
  padding:20px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.05);

  transition:0.2s;
}

.kpi-card:hover{
  transform:translateY(-3px);
}

.kpi-card h3{
  font-size:14px;
  color:#94a3b8;
  margin-bottom:10px;
}

.kpi-card p{
  font-size:28px;
  color:#60a5fa;
  font-weight:bold;
}

/* =========================
   CHARTS
========================= */

.charts-grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(520px,1fr));

  gap:22px;
}

.chart-box{
  background:#111827;
  padding:18px;
  border-radius:18px;

  border:1px solid rgba(255,255,255,0.05);

  min-height:420px;

  transition:0.2s;
}

.chart-box:hover{
  transform:translateY(-3px);
}

.chart-box select{
  margin-bottom:15px;

  padding:8px 12px;

  background:#1e293b;
  color:white;
  border:none;
  border-radius:10px;
}

.chart-box canvas{
  width:100% !important;
  height:320px !important;
  display:block;
}

/* =========================
   RCA
========================= */

#rac-results{
  margin-top:35px;
}

.rac-card{
  background:#111827;
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;

  border-left:4px solid #3b82f6;
}

/* =========================
   BUTTONS
========================= */

button{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

  .sidebar{
    position:relative;
    width:100%;
    height:auto;
  }

  .content{
    margin-left:0;
    width:100%;
  }

  .charts-grid{
    grid-template-columns:1fr;
  }

}

</style>

</head>

<body>
  
<div class="main-container">

<div class="content">

  <div class="sidebar">

  <h2>🧠 Control</h2>

  <div class="side-group">

    <label>Granularity</label>

    <select>
      <option>Daily</option>
      <option>Weekly</option>
      <option>Monthly</option>
    </select>

  </div>

  <div class="side-group">

    <label>Smoothing</label>

    <select>
      <option>OFF</option>
      <option>ON</option>
    </select>

  </div>

  <div class="side-group">

    <label>Top Sites</label>

    <input type="number" value="20">

  </div>

  <button class="export-btn">
    Export Report
  </button>

</div>

<!-- =====================================
TOP RIBBON
===================================== -->

<div class="top-ribbon"></div>

<!-- =====================================
HERO PANEL
===================================== -->

<div class="hero-panel">

  <h1>🚀 AutomationPark Dashboard</h1>

  <div class="top-controls">

    <input
      type="file"
      id="fileInput"
    >

    <input
      type="number"
      id="limitInput"
      value="20"
      placeholder="Points Limit"
    >

  </div>

</div>

<!-- =====================================
FILTERS
===================================== -->

<div id="filters" class="filters-grid"></div>

<!-- =====================================
KPI CARDS
===================================== -->

<div class="kpi-grid"></div>

<!-- =====================================
CHARTS
===================================== -->

<div class="charts-grid"></div>

<!-- =====================================
RCA RESULTS
===================================== -->

<div id="rac-results"></div>

<!-- =====================================
JS FILE
===================================== -->

<script src="dashboard.js"></script>

</div>
</div>

</body>

</html>
