<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutomationPark Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: #fff;
  padding: 20px;
}

h1 {
  color: #32d296;
}

/* FILTERS */
.filters-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
}

.filter-card {
  background: #1c2541;
  padding: 10px;
  border-radius: 10px;
  min-width: 150px;
}

.filter-card select {
  width: 100%;
  background: #2a355f;
  color: #fff;
  border: none;
  padding: 5px;
}

/* KPI */
.kpi-grid {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.kpi {
  background: #1c2541;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
  text-align: center;
}

/* CHART */
.chart-container {
  background: #1c2541;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🚀 AutomationPark Dashboard</h1>

<input type="file" id="fileInput">

<div id="filters-container" class="filters-grid"></div>

<div id="kpi-container" class="kpi-grid"></div>

<div class="chart-container">
  <canvas id="chart"></canvas>
</div>

<script>

let rawData = [];
let globalFilters = {};

// =====================
// FILE LOAD
// =====================
document.getElementById("fileInput").addEventListener("change", function(e){

  Papa.parse(e.target.files[0], {
    header: true,
    complete: function(results){
      rawData = results.data;
      createFilters(rawData);
      redrawDashboard();
    }
  });

});

// =====================
// FILTER ENGINE
// =====================
function createFilters(data){

  const container = document.getElementById("filters-container");
  container.innerHTML = "";

  const keys = Object.keys(data[0]);

  keys.forEach(key => {

    const values = [...new Set(data.map(d => d[key]))];

    if(values.length < 20 && isNaN(values[0])){

      const card = document.createElement("div");
      card.className = "filter-card";

      const label = document.createElement("div");
      label.innerText = key;

      const select = document.createElement("select");

      const all = document.createElement("option");
      all.value = "";
      all.innerText = "ALL";
      select.appendChild(all);

      values.forEach(v=>{
        const opt = document.createElement("option");
        opt.value = v;
        opt.innerText = v;
        select.appendChild(opt);
      });

      select.onchange = () => {
        globalFilters[key] = select.value;
        redrawDashboard();
      };

      card.appendChild(label);
      card.appendChild(select);
      container.appendChild(card);
    }

  });
}

// =====================
// APPLY FILTER
// =====================
function applyFilters(data){
  return data.filter(row=>{
    return Object.keys(globalFilters).every(key=>{
      if(!globalFilters[key]) return true;
      return row[key] == globalFilters[key];
    });
  });
}

// =====================
// KPI ENGINE
// =====================
function renderKPIs(data){

  const container = document.getElementById("kpi-container");
  container.innerHTML = "";

  const keys = Object.keys(data[0]);

  let numeric = keys.filter(k => !isNaN(data[0][k]));

  numeric.forEach(k=>{
    const sum = data.reduce((a,b)=>a + Number(b[k] || 0), 0);

    const div = document.createElement("div");
    div.className = "kpi";
    div.innerHTML = `<h3>${k}</h3><p>${Math.round(sum)}</p>`;

    container.appendChild(div);
  });
}

// =====================
// CHART ENGINE
// =====================

function renderCharts(data){

  const chartsContainer = document.getElementById("charts-container");
  chartsContainer.innerHTML = "";

  const keys = Object.keys(data[0]);

  let numeric = keys.filter(k => !isNaN(data[0][k]));
  let category = keys.find(k => isNaN(data[0][k]));

  numeric.forEach((numKey, index)=>{

    const grouped = {};

    data.forEach(d=>{

      const cat = d[category];
      const val = Number(d[numKey] || 0);

      if(!grouped[cat]) grouped[cat] = 0;

      grouped[cat] += val;

    });

    // CREATE CHART CARD
    const card = document.createElement("div");
    card.className = "chart-container";

    // TITLE
    const title = document.createElement("h3");
    title.innerText = numKey;

    // CANVAS
    const canvas = document.createElement("canvas");

    card.appendChild(title);
    card.appendChild(canvas);

    chartsContainer.appendChild(card);

    // CREATE CHART
    new Chart(canvas, {

      type: index % 2 === 0 ? "bar" : "line",

      data: {
        labels: Object.keys(grouped),

        datasets: [{
          label: numKey,
          data: Object.values(grouped),

          backgroundColor: "#32d29688",
          borderColor: "#32d296",
          borderWidth: 2,
          tension: 0.4
        }]
      },

      options: {
        responsive: true,

        plugins: {
          legend: {
            labels: {
              color: "white"
            }
          }
        },

        scales: {

          x: {
            ticks: {
              color: "white"
            }
          },

          y: {
            ticks: {
              color: "white"
            }
          }

        }

      }

    });

  });

}

// =====================
// MAIN RENDER
// =====================
function redrawDashboard(){
  const filtered = applyFilters(rawData);
  renderKPIs(filtered);
  renderChart(filtered);
}

</script>

</body>
</html>
