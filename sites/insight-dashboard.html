<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutomationPark Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    background:#081120;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    color:#32d296;
    margin-bottom:20px;
}

/* =========================
UPLOAD
========================= */

.top-bar{
    display:flex;
    gap:20px;
    align-items:center;
    margin-bottom:20px;
}

/* =========================
FILTERS
========================= */

.filters-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.filters-grid div{
    background:#18233b;
    padding:10px;
    border-radius:10px;
}

.filters-grid label{
    display:block;
    margin-bottom:6px;
    font-size:13px;
    color:#9fb3d1;
}

.filters-grid select{
    width:100%;
    background:#253352;
    color:white;
    border:none;
    padding:8px;
    border-radius:6px;
}

/* =========================
KPI
========================= */

.kpi-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.kpi-card{
    background:#18233b;
    padding:20px;
    border-radius:14px;
    text-align:center;
}

.kpi-card h3{
    margin:0;
    font-size:15px;
    color:#9fb3d1;
}

.kpi-card p{
    font-size:28px;
    margin-top:10px;
    color:#32d296;
}

/* =========================
CHARTS
========================= */

.charts-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(500px,1fr));
    gap:20px;
}

.chart-box{
    background:#18233b;
    border-radius:14px;
    padding:15px;
}

.chart-box canvas{
    width:100% !important;
    height:350px !important;
}

/* =========================
RAC
========================= */

#rac-results{
    margin-top:30px;
}

.rac-card{
    background:#18233b;
    padding:15px;
    border-left:5px solid #32d296;
    margin-bottom:10px;
    border-radius:8px;
}

</style>
</head>

<body>

<h1>🚀 AutomationPark Dashboard</h1>

<div class="top-bar">

<input type="file" id="fileInput">

<div>
<label>Top N Records</label><br>
<input type="number" id="limitInput" value="20">
</div>

</div>

<div id="filters" class="filters-grid"></div>

<div class="kpi-grid"></div>

<div class="charts-grid"></div>

<div id="rac-results"></div>

<script src="dashboard_v2.js"></script>

</body>
</html>
