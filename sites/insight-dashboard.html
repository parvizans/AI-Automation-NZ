<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AutomationPark Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* =========================================
   TOP RIBBON FIX
========================================= */

.top-ribbon{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:6px;

  background:
    linear-gradient(
      90deg,
      #32d296,
      #2563eb,
      #7c3aed,
      #32d296
    );

  z-index:99999;

  box-shadow:
    0 0 20px rgba(50,210,150,0.6);

}
/* =========================================
   GLOBAL
========================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;

  background:
    linear-gradient(
      rgba(5,10,25,0.96),
      rgba(5,10,25,0.96)
    ),
    url("assets/Hero-4.jpg")
    center/cover no-repeat fixed;

  color:white;

  padding:25px;

  min-height:100vh;
}

/* =========================================
   TITLE
========================================= */

h1{
  color:#32d296;

  margin-bottom:25px;

  font-size:48px;

  font-weight:700;

  text-shadow:
    0 0 15px rgba(50,210,150,0.35);
}

/* =========================================
   INPUTS
========================================= */

input{
  background:#1c2541;

  color:white;

  border:none;

  padding:12px 16px;

  border-radius:12px;

  margin-right:12px;

  margin-bottom:20px;

  outline:none;

  transition:0.3s;

  box-shadow:
    0 5px 15px rgba(0,0,0,0.25);
}

input:focus{
  border:1px solid #32d296;
}

/* =========================================
   FILTERS
========================================= */

.filters-grid{
  display:flex;

  flex-wrap:wrap;

  gap:14px;

  margin-bottom:25px;
}

.filters-grid div{

  background:
    rgba(28,37,65,0.95);

  padding:12px;

  border-radius:14px;

  min-width:160px;

  border:
    1px solid rgba(255,255,255,0.05);

  box-shadow:
    0 8px 20px rgba(0,0,0,0.35);

  transition:0.3s;
}

.filters-grid div:hover{
  transform:translateY(-2px);
}

.filters-grid label{

  display:block;

  margin-bottom:8px;

  font-size:13px;

  font-weight:bold;

  color:#d1d5db;

  text-transform:uppercase;

  letter-spacing:1px;
}

.filters-grid select{

  width:100%;

  background:#2a355f;

  color:white;

  border:none;

  padding:10px;

  border-radius:8px;

  outline:none;

  font-size:13px;
}

/* =========================================
   KPI GRID
========================================= */

.kpi-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

  gap:18px;

  margin-bottom:30px;
}

.kpi-card{

  background:
    linear-gradient(
      145deg,
      rgba(28,37,65,0.95),
      rgba(18,25,45,0.95)
    );

  padding:24px;

  border-radius:18px;

  text-align:center;

  border:
    1px solid rgba(255,255,255,0.05);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.35);

  transition:0.3s;
}

.kpi-card:hover{

  transform:translateY(-4px);

  box-shadow:
    0 15px 35px rgba(0,0,0,0.45);
}

.kpi-card h3{

  font-size:15px;

  color:#d1d5db;

  margin-bottom:12px;

  text-transform:uppercase;
}

.kpi-card p{

  font-size:28px;

  font-weight:bold;

  color:#32d296;

  text-shadow:
    0 0 12px rgba(50,210,150,0.25);
}

/* =========================================
   CHART GRID
========================================= */

.charts-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(420px,1fr));

  gap:22px;
}

/* =========================================
   CHART BOX
========================================= */

.chart-box{

  background:
    linear-gradient(
      145deg,
      rgba(28,37,65,0.95),
      rgba(18,25,45,0.95)
    );

  padding:20px;

  border-radius:18px;

  border:
    1px solid rgba(255,255,255,0.05);

  box-shadow:
    0 12px 35px rgba(0,0,0,0.4);

  transition:0.3s;

  position:relative;

  overflow:hidden;
}

.chart-box:hover{

  transform:translateY(-4px);

  box-shadow:
    0 18px 40px rgba(0,0,0,0.5);
}

/* Glow Effect */

.chart-box::before{

  content:"";

  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:4px;

  background:
    linear-gradient(
      90deg,
      #32d296,
      #2563eb,
      #7c3aed
    );
}

/* =========================================
   CHART SELECTOR
========================================= */

.chart-box select{

  background:#2a355f;

  color:white;

  border:none;

  padding:8px 12px;

  border-radius:8px;

  margin-bottom:15px;

  outline:none;

  cursor:pointer;
}

/* =========================================
   CHART CANVAS
========================================= */

.chart-box canvas{

  width:100% !important;

  height:320px !important;
}

/* =========================================
   RAC ENGINE
========================================= */

#rac-results{

  margin-top:35px;
}

.rac-card{

  background:
    linear-gradient(
      145deg,
      rgba(28,37,65,0.95),
      rgba(18,25,45,0.95)
    );

  padding:18px;

  border-radius:14px;

  margin-bottom:14px;

  border-left:6px solid #32d296;

  box-shadow:
    0 8px 25px rgba(0,0,0,0.35);

  transition:0.3s;
}

.rac-card:hover{

  transform:translateX(3px);
}

.rac-card strong{

  color:#32d296;

  font-size:16px;
}

/* =========================================
   SCROLLBAR
========================================= */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-track{
  background:#0b1220;
}

::-webkit-scrollbar-thumb{
  background:#2a355f;
  border-radius:20px;
}

::-webkit-scrollbar-thumb:hover{
  background:#32d296;
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:768px){

  h1{
    font-size:32px;
  }

  .charts-grid{
    grid-template-columns:1fr;
  }

  .filters-grid{
    flex-direction:column;
  }

  .filters-grid div{
    width:100%;
  }

  .kpi-card p{
    font-size:22px;
  }

}

</style>

</head>

<body>

<h1>🚀 AutomationPark Dashboard</h1>

<input type="file" id="fileInput">

<input
  type="number"
  id="limitInput"
  value="20"
  placeholder="Points Limit"
>

<div id="filters" class="filters-grid"></div>

<div class="kpi-grid"></div>

<div class="charts-grid"></div>

<div id="rac-results"></div>

<script src="dashboard.js"></script>

</body>
</html>
