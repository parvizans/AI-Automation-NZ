<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Network Insight Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  margin:0;
  padding:20px;
}

.container {
  max-width:1400px;
  margin:auto;
}

h1 {
  color:#32d296;
  margin-bottom:20px;
}

/* KPI CARDS */
.kpi-grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin-bottom:30px;
}

.card {
  background: linear-gradient(145deg, #1c2541, #141b2d);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h2 {
  font-size: 26px;
  color: #32d296;
}

.card p {
  font-size: 14px;
  color: #bbb;
}

/* CHARTS */
.chart-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(400px,1fr));
  gap:20px;
}

.chart-box {
  background:#1c2541;
  padding:20px;
  border-radius:12px;
  height:300px;
}

/* ALERTS */
.alerts {
  margin-top:30px;
  background:#2a1a1a;
  padding:15px;
  border-radius:10px;
}

.alert {
  color:#ff6b6b;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📡 Network Insight Dashboard</h1>

<!-- Upload -->
<input type="file" id="fileInput" accept=".csv,.txt,.xlsx,.xls">
<button onclick="loadData()">Upload CSV</button>

<!-- Filters -->
<select id="siteFilter">...</select>
  
<!-- KPI CARDS -->
<div class="kpi-grid">
  <div class="card">
    <h2 id="throughput">85 Mbps</h2>
    <p>Throughput</p>
  </div>
  <div class="card">
    <h2 id="rsrp">-95 dBm</h2>
    <p>RSRP</p>
  </div>
  <div class="card">
    <h2 id="rsrq">-10 dB</h2>
    <p>RSRQ</p>
  </div>
  <div class="card">
    <h2 id="sinr">18 dB</h2>
    <p>SINR</p>
  </div>
  <div class="card">
    <h2 id="drop">2%</h2>
    <p>Drop Rate</p>
  </div>
</div>

<!-- CHARTS -->
<div id="chartContainer" class="chart-grid"></div>


<!-- ALERTS -->
<div class="alerts">
  <h3>🚨 Network Alerts</h3>
  <div class="alert">⚠ High drop rate detected in Sector A</div>
  <div class="alert">⚠ SINR degradation observed</div>
</div>

</div>
 
  
</div>  <!-- FIXED closing div -->

<script>

  
  // =======================
 //   Detect KPI VARIABLES
// =======================

  function detectKPIs(headers) {

  return headers.filter(h => {
    const name = h.toLowerCase();

    return (
      name.includes("throughput") ||
      name.includes("rsrp") ||
      name.includes("rsrq") ||
      name.includes("sinr") ||
      name.includes("snir") ||
      name.includes("drop") ||
      name.includes("traffic") ||
      name.includes("availability")
    );
  });
}
   // =======================
 //   Auto Generate Charts
// =======================
let charts = [];

function generateCharts(kpis) {

  const container = document.getElementById("chartContainer");

  charts.forEach(c => c.destroy());
  charts = [];

  container.innerHTML = "";

  kpis.forEach((kpi) => {

    const box = document.createElement("div");
    box.className = "chart-box";

    const canvas = document.createElement("canvas");
    box.appendChild(canvas);
    container.appendChild(box);

let dataIndex = getIndex(kpi);
if (dataIndex === -1) return; // skip bad columns

    let data = rawData.map(r => Number(r[dataIndex]) || 0);
    let labels = rawData.map((_, i) => i + 1);

    // 🎨 Smart colors
    let color = "#32d296";
    if (kpi.toLowerCase().includes("drop")) color = "#ff6b6b";
    if (kpi.toLowerCase().includes("rsrp")) color = "#4dabf7";
    if (kpi.toLowerCase().includes("sinr")) color = "#ffd43b";

    let chart = new Chart(canvas, {
      type: getChartType(kpi),
      data: {
        labels: labels,
        datasets: [{
          label: kpi,
          data: data,
          borderColor: color,
          backgroundColor: color + "33",
          borderWidth: 2,
          tension: 0.3
        }]
      }
    });

    charts.push(chart);
  });
}


   // =======================
 //   Auto Generate Charts Types
// =======================
  
  function getChartType(kpi) {

  const name = kpi.toLowerCase();

  if (name.includes("drop")) return "bar";
  if (name.includes("availability")) return "line";
  if (name.includes("traffic")) return "bar";
  if (name.includes("throughput")) return "line";

  return "line"; // default
}

// =======================
// GLOBAL VARIABLES
// =======================
let rawData = [];
let headers = [];
let currentIndustry = "unknown";





// =======================
// LOAD FILE
// =======================
function loadData() {

  const input = document.getElementById("fileInput");

  if (!input.files.length) {
    alert("Please select a file first!");
    return;
  }

  const file = input.files[0];
  const fileName = file.name.toLowerCase();

  if (fileName.endsWith(".csv") || fileName.endsWith(".txt")) {

    const reader = new FileReader();

    reader.onload = function(e) {
      processTextData(e.target.result);
    };

    reader.readAsText(file);

  } else {
    alert("Only CSV/TXT supported for now");
  }
}


// =======================
// PROCESS DATA
// =======================
function processTextData(text) {

  const rows = text.split("\n");

  // HEADERS
  headers = rows[0].split(",");

  // DATA FIRST 🔥
  rawData = rows
    .slice(1)
    .filter(r => r.trim() !== "")
    .map(r => r.split(","));

   // ✅ ADD HERE 👇
  console.log("Headers:", headers);
  console.log("Raw Data:", rawData);

  // DETECT INDUSTRY
  currentIndustry = detectIndustry(headers);
  console.log("Detected:", currentIndustry);

  // KPI CALCULATION
  calculateKPI();

  // 🔥 NOW DETECT KPIs (after data exists)
  let kpis = detectKPIs(headers);
  console.log("KPIs detected:", kpis);

  // 🔥 NOW GENERATE CHARTS
  generateCharts(kpis);
}


// =======================
// INDUSTRY DETECTION
// =======================
function detectIndustry(headers) {

  const h = headers.join(" ").toLowerCase();

  if (
    h.includes("rsrp") ||
    h.includes("rsrq") ||
    h.includes("sinr") ||
    h.includes("snir") ||
    h.includes("throughput") ||
    h.includes("drop")
  ) return "telecom";

  return "unknown";
}


// =======================
// FIND COLUMN INDEX
// =======================
function getIndex(name) {
  return headers.findIndex(h => 
    h.toLowerCase().replace(/[^a-z]/g, "")
    .includes(name.toLowerCase())
  );
}


// =======================
// KPI CALCULATION
// =======================
function calculateKPI() {

  if (currentIndustry !== "telecom") return;

  let thr = getIndex("throughput");
  let rsrp = getIndex("rsrp");
  let rsrq = getIndex("rsrq");
  let sinr = getIndex("sinr") !== -1 ? getIndex("sinr") : getIndex("snir");
  let drop = getIndex("drop");

  let t=0, r1=0, r2=0, s=0, d=0, c=0;

  rawData.forEach(row => {
    t += Number(row[thr]);
    r1 += Number(row[rsrp]);
    r2 += Number(row[rsrq]);
    s += Number(row[sinr]);
    d += Number(row[drop]);
    c++;
  });

  document.getElementById("throughput").innerText = (t/c).toFixed(0) + " Mbps";
  document.getElementById("rsrp").innerText = (r1/c).toFixed(0) + " dBm";
  document.getElementById("rsrq").innerText = (r2/c).toFixed(0) + " dB";
  document.getElementById("sinr").innerText = (s/c).toFixed(0) + " dB";
  document.getElementById("drop").innerText = (d/c).toFixed(2) + " %";
}


</script>

</body>
</html>
