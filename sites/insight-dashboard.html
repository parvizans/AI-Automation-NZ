<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>AutomationPark Dashboard</title>

<!-- =====================================
LIBRARIES
===================================== -->

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- =====================================
STYLE
===================================== -->

<style>

/* =========================================
GLOBAL
========================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:Arial, sans-serif;

  background:
    linear-gradient(
      rgba(5,10,25,0.94),
      rgba(5,10,25,0.96)
    ),
    url("assets/Hero-4.jpg")
    center/cover fixed no-repeat;

  color:white;

  padding:20px;

  min-height:100vh;

  overflow-x:hidden;
}

/* =========================================
TOP RIBBON
========================================= */

.top-ribbon{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:5px;

  z-index:9999;

  background:
    linear-gradient(
      90deg,
      #32d296,
      #00c2ff,
      #7c3aed,
      #32d296
    );

  background-size:300% 300%;

  animation:ribbonMove 8s linear infinite;

  box-shadow:
    0 0 18px rgba(0,194,255,0.8);
}

@keyframes ribbonMove{

  0%{
    background-position:0% 50%;
  }

  100%{
    background-position:100% 50%;
  }

}

/* =========================================
HERO PANEL
========================================= */

.hero-panel{

  position:relative;

  background:
    linear-gradient(
      145deg,
      rgba(20,30,60,0.90),
      rgba(10,18,35,0.92)
    );

  border-radius:24px;

  padding:18px 22px;

  margin-bottom:20px;

  overflow:hidden;

  border:
    1px solid rgba(50,210,150,0.15);

  box-shadow:
    0 0 40px rgba(0,194,255,0.12);
}

/* =========================================
TITLE
========================================= */

.hero-panel h1{

  font-size:58px;

  margin-bottom:15px;

  color:#32d296;

  font-weight:800;

  text-shadow:
    0 0 18px rgba(50,210,150,0.35);
}

/* =========================================
TOP CONTROLS
========================================= */

.top-controls{

  display:flex;

  gap:14px;

  flex-wrap:wrap;

  margin-top:10px;
}

input{

  background:#1c2541;

  color:white;

  border:none;

  padding:12px 16px;

  border-radius:12px;

  outline:none;

  min-width:160px;

  transition:0.3s;

  box-shadow:
    0 6px 15px rgba(0,0,0,0.25);
}

input:focus{

  border:
    1px solid #32d296;
}

/* =========================================
FILTERS
========================================= */

.filters-grid{

  display:flex;

  flex-wrap:wrap;

  gap:14px;

  margin-bottom:30px;
}

.filters-grid div{

  background:
    rgba(28,37,65,0.95);

  padding:12px;

  border-radius:14px;

  min-width:160px;

  border:
    1px solid rgba(255,255,255,0.05);

  box-shadow:
    0 8px 20px rgba(0,0,0,0.35);

  transition:0.3s;
}

.filters-grid div:hover{

  transform:translateY(-2px);
}

.filters-grid label{

  display:block;

  margin-bottom:8px;

  font-size:13px;

  font-weight:bold;

  color:#d1d5db;

  text-transform:uppercase;

  letter-spacing:1px;
}

.filters-grid select{

  width:100%;

  background:#36446b;

  color:white;

  font-weight:bold;

  border:none;

  padding:10px;

  border-radius:8px;

  outline:none;
}

/* =========================================
KPI GRID
========================================= */

.kpi-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

  gap:18px;

  margin-bottom:30px;
}

.kpi-card{

  background:
    linear-gradient(
      145deg,
      rgba(28,37,65,0.96),
      rgba(18,25,45,0.96)
    );

  padding:24px;

  border-radius:18px;

  text-align:center;

  border:
    1px solid rgba(255,255,255,0.05);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.35);

  transition:0.3s;
}

.kpi-card:hover{

  transform:translateY(-4px);
}

.kpi-card h3{

  font-size:15px;

  color:#d1d5db;

  margin-bottom:12px;

  text-transform:uppercase;
}

.kpi-card p{

  font-size:32px;

  font-weight:bold;

  color:#32d296;

  text-shadow:
    0 0 14px rgba(50,210,150,0.3);
}

/* =========================================
CHART GRID
========================================= */

.charts-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(420px,1fr));

  gap:22px;
}

/* =========================================
CHART BOX
========================================= */

.chart-box{

  position:relative;

  overflow:hidden;

  background:
    linear-gradient(
      145deg,
      rgba(28,37,65,0.96),
      rgba(18,25,45,0.96)
    );

  padding:20px;

  border-radius:20px;

  border:
    1px solid rgba(255,255,255,0.05);

  box-shadow:
    0 12px 35px rgba(0,0,0,0.4);

  transition:0.3s;
}

.chart-box:hover{

  transform:translateY(-4px);

  box-shadow:
    0 18px 45px rgba(0,0,0,0.5);
}

.chart-box::before{

  content:"";

  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:4px;

  background:
    linear-gradient(
      90deg,
      #32d296,
      #2563eb,
      #7c3aed
    );
}

/* =========================================
CHART SELECT
========================================= */

.chart-box select{

  background:#2a355f;

  color:white;

  border:none;

  padding:8px 12px;

  border-radius:8px;

  margin-bottom:15px;

  outline:none;

  cursor:pointer;
}

/* =========================================
CANVAS
========================================= */

.chart-box canvas{

  width:100% !important;

  height:320px !important;
}

/* =========================================
RAC ENGINE
========================================= */

#rac-results{

  margin-top:35px;
}

.rac-card{

  background:
    linear-gradient(
      145deg,
      rgba(28,37,65,0.96),
      rgba(18,25,45,0.96)
    );

  padding:18px;

  border-radius:14px;

  margin-bottom:14px;

  border-left:6px solid #32d296;

  box-shadow:
    0 8px 25px rgba(0,0,0,0.35);
}

/* =========================================
SCROLLBAR
========================================= */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-track{
  background:#0b1220;
}

::-webkit-scrollbar-thumb{
  background:#2a355f;
  border-radius:20px;
}

::-webkit-scrollbar-thumb:hover{
  background:#32d296;
}

/* =========================================
MOBILE
========================================= */

@media(max-width:768px){

  .hero-panel h1{
    font-size:34px;
  }

  .charts-grid{
    grid-template-columns:1fr;
  }

  .filters-grid{
    flex-direction:column;
  }

  .filters-grid div{
    width:100%;
  }

}

</style>

</head>

<body>

<!-- =====================================
TOP RIBBON
===================================== -->

<div class="top-ribbon"></div>

<!-- =====================================
HERO PANEL
===================================== -->

<div class="hero-panel">

  <h1>🚀 AutomationPark Dashboard</h1>

  <div class="top-controls">

    <input
      type="file"
      id="fileInput"
    >

    <input
      type="number"
      id="limitInput"
      value="20"
      placeholder="Points Limit"
    >

  </div>

</div>

<!-- =====================================
FILTERS
===================================== -->

<div id="filters" class="filters-grid"></div>

<!-- =====================================
KPI CARDS
===================================== -->

<div class="kpi-grid"></div>

<!-- =====================================
CHARTS
===================================== -->

<div class="charts-grid"></div>

<!-- =====================================
RCA RESULTS
===================================== -->

<div id="rac-results"></div>

<!-- =====================================
JS FILE
===================================== -->

<script src="dashboard.js"></script>

</body>

</html>
