<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>AutomationPark Dashboard</title>

<!-- =====================================
LIBRARIES
===================================== -->

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- =====================================
STYLE
===================================== -->

<style>

/* =========================
   GLOBAL RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
  overflow-x:hidden;

  background:
    linear-gradient(rgba(11,18,32,0.88), rgba(11,18,32,0.92)),
    url("../assets/Hero-4.jpg") center/cover no-repeat fixed;
}

/* =========================
   MAIN LAYOUT
========================= */

.main-container{
  display:flex;
  min-height:100vh;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
  width:260px;
  background:#111827;
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.06);

  position:sticky;
  top:0;
  height:100vh;

  overflow-y:auto;
}

.sidebar h2{
  font-size:22px;
  margin-bottom:25px;
  color:#60a5fa;
}

.sidebar label{
  display:block;
  margin-top:15px;
  margin-bottom:6px;
  font-size:13px;
  color:#cbd5e1;
}

.sidebar select,
.sidebar input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
}

/* =========================
   CONTENT
========================= */

.content{
  flex:1;
  padding:20px;
}

/* =========================
   KPI CARDS
========================= */

.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.kpi-card{
  background:#111827;
  padding:18px;
  border-radius:18px;

  border:1px solid rgba(255,255,255,0.05);

  transition:0.2s ease;
  .chart-card:hover{
   transform:translateY(-3px);
}
}

.kpi-card:hover{
  transform:translateY(-2px);
}

.kpi-card h3{
  font-size:14px;
  color:#94a3b8;
  margin-bottom:8px;
}

.kpi-card p{
  font-size:28px;
  font-weight:bold;
  color:#60a5fa;
}

/* =========================
   CHART GRID
========================= */

.charts-grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(500px,1fr));

  gap:20px;
}

/* =========================
   CHART CARD
========================= */

.chart-card{
  background:#111827;

  border-radius:18px;

  padding:18px;

  border:1px solid rgba(255,255,255,0.05);

  min-height:420px;

  overflow:hidden;
}

/* =========================
   CHART TITLE
========================= */

.chart-title{
  font-size:16px;
  margin-bottom:15px;
  color:#e2e8f0;
}

/* =========================
   CANVAS
========================= */

.chart-card canvas{
  width:100% !important;
  height:340px !important;
}

/* =========================
   MAP
========================= */

#map{
  width:100%;
  height:650px;

  border-radius:20px;

  overflow:hidden;

  margin-top:25px;

  border:1px solid rgba(255,255,255,0.05);
}

/* =========================
   BUTTONS
========================= */

button{
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:10px;
  cursor:pointer;

  transition:0.2s;
}

button:hover{
  background:#1d4ed8;
}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-track{
  background:#0b1220;
}

::-webkit-scrollbar-thumb{
  background:#334155;
  border-radius:10px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:1000px){

  .main-container{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:auto;
    position:relative;
  }

  .charts-grid{
    grid-template-columns:1fr;
  }

  .chart-card{
    min-height:380px;
  }

  #map{
    height:500px;
  }
}

</style>

</head>

<body>

  <div class="sidebar">

  <h2>🧠 Control</h2>

  <div class="side-group">

    <label>Granularity</label>

    <select>
      <option>Daily</option>
      <option>Weekly</option>
      <option>Monthly</option>
    </select>

  </div>

  <div class="side-group">

    <label>Smoothing</label>

    <select>
      <option>OFF</option>
      <option>ON</option>
    </select>

  </div>

  <div class="side-group">

    <label>Top Sites</label>

    <input type="number" value="20">

  </div>

  <button class="export-btn">
    Export Report
  </button>

</div>

<!-- =====================================
TOP RIBBON
===================================== -->

<div class="top-ribbon"></div>

<!-- =====================================
HERO PANEL
===================================== -->

<div class="hero-panel">

  <h1>🚀 AutomationPark Dashboard</h1>

  <div class="top-controls">

    <input
      type="file"
      id="fileInput"
    >

    <input
      type="number"
      id="limitInput"
      value="20"
      placeholder="Points Limit"
    >

  </div>

</div>

<!-- =====================================
FILTERS
===================================== -->

<div id="filters" class="filters-grid"></div>

<!-- =====================================
KPI CARDS
===================================== -->

<div class="kpi-grid"></div>

<!-- =====================================
CHARTS
===================================== -->

<div class="charts-grid"></div>

<!-- =====================================
RCA RESULTS
===================================== -->

<div id="rac-results"></div>

<!-- =====================================
JS FILE
===================================== -->

<script src="dashboard.js"></script>

</body>

</html>
