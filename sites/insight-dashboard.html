<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AutomationPark Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family:Arial;
  background:#0b1220;
  color:white;
  padding:20px;
}

h1{
  color:#32d296;
}

/* FILTERS */
.filters-grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

.filters-grid div{
  background:#1c2541;
  padding:10px;
  border-radius:10px;
  min-width:150px;
}

.filters-grid label{
  display:block;
  margin-bottom:5px;
}

.filters-grid select{
  width:100%;
  background:#2a355f;
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
}

/* KPI */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.kpi-card{
  background:#1c2541;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

/* CHARTS */
.charts-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(500px,1fr));
  gap:20px;
}

.chart-box{
  background:#1c2541;
  padding:20px;
  border-radius:15px;
}

/* RAC */
#rac-results{
  margin-top:30px;
}

.rac-card{
  background:#1c2541;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:20px;
}

</style>

</head>

<body>

<h1>🚀 AutomationPark Dashboard</h1>

<input type="file" id="fileInput">

<input
  type="number"
  id="limitInput"
  value="20"
  placeholder="Points Limit"
>

<div id="filters" class="filters-grid"></div>

<div class="kpi-grid"></div>

<div class="charts-grid"></div>

<div id="rac-results"></div>

<script src="dashboard.js"></script>

</body>
</html>
