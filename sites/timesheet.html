<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timesheet_Pro_2</title>

<link rel="stylesheet" href="timesheet.css">

</head>

<body class="timesheet">

<div class="container">

<h1>⏱ Timesheet_Pro_2</h1>

<div class="top-buttons">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goInvoice()" class="blue">📄 Invoice</button>
  <button onclick="goExpenses()" class="yellow">💰 Expenses</button>
</div>

<div class="control-panel">

<div class="field">
<label>Month</label>
<select id="month">
<option value="">Select</option>
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>
</div>

<div class="field">
<label>Engineer</label>
<select id="engineer">
<option value="">Select</option>
<option value="parviz.ansari@linkquestglobal.com" data-phone="64220100700">Parviz Ansari</option>
</select>
</div>

<div class="field">
<label>Email</label>
<input id="eng-email" readonly>
</div>

<div class="field">
<label>Phone</label>
<input id="eng-phone" readonly>
</div>

<div class="field">
<label>Project</label>
<select id="project">
<option>Select</option>
<option>Telecom PRJ001</option>
</select>
</div>

<div class="field">
<label>Project Manager</label>
<select id="pm">
<option value="">Select</option>
<option value="dani.ray.salcedo@accenture.com">Dani Ray</option>
</select>
</div>

<div class="field">
<label>PM Email</label>
<input id="pm-email" readonly>
</div>

<div class="field">
<label>Location</label>
<select id="location">
<option value="sydney">Sydney</option>
<option value="outside">Outside Sydney</option>
</select>
</div>

<div class="expected-box">Expected: 8h/day</div>

</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Day</th>
<th>Date</th>
<th>Weekday</th>
<th>Time In</th>
<th>Time Out</th>
<th>Total</th>
<th>OT</th>
<th>Food</th>
</tr>
</thead>
<tbody id="timesheet-body"></tbody>
</table>
</div>

<div class="summary-grid">
<div class="card weekday">
Weekdays Days: <span id="wd-days">0</span><br>
Weekdays Hours: <span id="wd-hours">0</span>
</div>

<div class="card weekend">
Weekend Days: <span id="we-days">0</span><br>
Weekend OT: <span id="we-ot">0</span>
</div>
</div>

<div class="actions">
<button class="save">Save</button>
<button class="export">Export</button>
<button class="submit">Submit</button>
</div>

</div>

<script src="timesheet.js"></script>

</body>
</html>
