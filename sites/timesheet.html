<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timesheet_Pro_2</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  padding:20px;
}

.container { max-width:1400px; margin:auto; }

h1 { margin-bottom:20px; color:#32d296; }

/* CONTROL PANEL GRID */
.control-panel {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}

.field { display:flex; flex-direction:column; }

label {
  font-size:12px;
  color:#b8c3e6;
  margin-bottom:5px;
}

select, input {
  padding:8px;
  border-radius:6px;
  background:#1c2541;
  color:#fff;
  border:none;
}

/* GREEN BOX */
.expected-box {
  background:#32d296;
  color:#000;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
  text-align:center;
}

/* TABLE */
.table-container {
  background:#1c2541;
  padding:10px;
  border-radius:10px;
}

table { width:100%; border-collapse:collapse; }

th, td {
  padding:10px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
}

thead { background:#111a33; }

.time-in {
  background:#2a355f;
  font-weight:bold;
}

.food-yes { color:#32d296; font-weight:bold; }
.food-no { color:#ff6b6b; }

/* SUMMARY */
.summary-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  margin-top:20px;
}

.card {
  padding:15px;
  border-radius:10px;
  font-weight:bold;
}

.weekday { background:#1c2541; }
.weekend { background:#2a1c1c; }

/* BUTTONS */
.actions {
  margin-top:20px;
  display:flex;
  gap:10px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.save { background:#32d296; }
.export { background:#5aa7ff; }
.submit { background:#ffcc00; }

</style>
</head>

<body>

<div class="container">

<h1>⏱ Timesheet_Pro_2</h1>

<div class="control-panel">

<div class="field">
<label>Month</label>
<select id="month">
<option value="">Select</option>
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>
</div>

<div class="field">
<label>Engineer</label>
<select id="engineer">
<option value="">Select</option>
<option value="abhignya.reddy@linkquestglobal.com" data-phone="">Abhignya Reddy</option>
<option value="parviz.ansari@linkquestglobal.com" data-phone="04220100700">Parviz Ansari</option>
<option value="pavinee.suwanta@linkquestglobal.com">Pavinee Suwanta</option>
<option value="abhishek.ahirrao@linkquestglobal.com">Abhishek Ahirrao</option>
<option value="sanjay.nampally@linkquestglobal.com">Sanjay Nampally</option>
<option value="saidinesh.mogili@linkquestglobal.com">Sai Dinesh Mogili</option>
<option value="manish.redekar@linkquestglobal.com">Manish Redekar</option>
<option value="shivtejgasti@gmail.com">Shivtej Gasti</option>
<option value="skofficial8991@gmail.com">Shreekant Kadam</option>
<option value="ergaganverma@gmail.com">Gagan Verma</option>
</select>
</div>

<div class="field">
<label>Email</label>
<input id="eng-email" readonly>
</div>

<div class="field">
<label>Phone</label>
<input id="eng-phone" readonly>
</div>

<div class="field">
<label>Project</label>
<select id="project">
<option>Select</option>
<option>Telecom PRJ001</option>
<option>5G PRJ002</option>
<option>Drive Test PRJ003</option>
</select>
</div>

<div class="field">
<label>Project Manager</label>
<select id="pm">
<option value="">Select</option>
<option value="dani.ray.salcedo@accenture.com">Dani Ray</option>
<option value="Alyanna.Moje@accenture.com">Alyanna Moje</option>
<option value="neil.coomar@linkquestglobal.com">Neil Coomar</option>
</select>
</div>

<div class="field">
<label>PM Email</label>
<input id="pm-email" readonly>
</div>

<div class="field">
<label>Location</label>
<select id="location">
<option value="sydney">Sydney</option>
<option value="outside">Outside Sydney</option>
</select>
</div>

<div class="expected-box">Expected: 8h/day</div>

</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Day</th>
<th>Date</th>
<th>Weekday</th>
<th>Time In</th>
<th>Time Out</th>
<th>Total</th>
<th>OT</th>
<th>Food</th>
</tr>
</thead>
<tbody id="timesheet-body"></tbody>
</table>
</div>

<div class="summary-grid">
<div class="card weekday">
Weekdays Days: <span id="wd-days">0</span><br>
Weekdays Hours: <span id="wd-hours">0</span>
</div>
<div class="card weekend">
Weekend Days: <span id="we-days">0</span><br>
Weekend OT: <span id="we-ot">0</span>
</div>
</div>

<div class="actions">
<button class="save">Save</button>
<button class="export">Export</button>
<button class="submit">Submit</button>
</div>

</div>

<script>

/* AUTO FILL */
document.getElementById("engineer").addEventListener("change", function(){
  const s = this.options[this.selectedIndex];
  document.getElementById("eng-email").value = s.value;
  document.getElementById("eng-phone").value = s.dataset.phone || "";
});

document.getElementById("pm").addEventListener("change", function(){
  document.getElementById("pm-email").value = this.value;
});

/* DAY NAME */
function getDayName(date){
  return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][date.getDay()];
}

/* GENERATE */
function generateMonth(){
  const month = document.getElementById("month").value;
  if(month==="") return;

  const year = new Date().getFullYear();
  const days = new Date(year, parseInt(month)+1, 0).getDate();

  const tbody = document.getElementById("timesheet-body");
  tbody.innerHTML="";

  for(let i=1;i<=days;i++){
    const d = new Date(year, month, i);
    const date = d.toISOString().split('T')[0];

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${i}</td>
      <td><input type="date" value="${date}"></td>
      <td>${getDayName(d)}</td>
      <td><input type="time" value="08:00" readonly class="time-in"></td>
      <td><input type="time" step="900" class="time-out"></td>
      <td class="total">0</td>
      <td class="ot">0</td>
      <td class="food">-</td>
    `;

    tbody.appendChild(row);
  }
}

/* CALC */
function calculateRow(row){
  const timeOut = row.querySelector(".time-out").value;
  if(!timeOut) return;

  const dateVal = row.querySelector("input[type=date]").value;
  const day = new Date(dateVal).getDay();

  const start = new Date("1970-01-01T08:00:00");
  const end = new Date(`1970-01-01T${timeOut}:00`);

  let total = (end-start)/(1000*60*60);
  if(total<0) total=0;

  const ot = total>8 ? total-8 : 0;

  row.querySelector(".total").innerText = total.toFixed(2);
  row.querySelector(".ot").innerText = ot.toFixed(2);

  const loc = document.getElementById("location").value;
  const food = row.querySelector(".food");

  if(loc==="outside"){
    food.innerText="$50";
    food.className="food food-yes";
  } else {
    food.innerText="-";
    food.className="food food-no";
  }

  updateSummary();
}

/* SUMMARY */
function updateSummary(){
  let wdDays=0, wdHours=0, weDays=0, weOT=0;

  document.querySelectorAll("tbody tr").forEach(row=>{
    const dateVal = row.querySelector("input[type=date]").value;
    const day = new Date(dateVal).getDay();

    const total = parseFloat(row.querySelector(".total").innerText)||0;
    const ot = parseFloat(row.querySelector(".ot").innerText)||0;

    if(day===0 || day===6){
      if(total>0) weDays++;
      weOT+=ot;
    } else {
      if(total>0) wdDays++;
      wdHours+=total;
    }
  });

  document.getElementById("wd-days").innerText = wdDays;
  document.getElementById("wd-hours").innerText = wdHours.toFixed(2);
  document.getElementById("we-days").innerText = weDays;
  document.getElementById("we-ot").innerText = weOT.toFixed(2);
}

/* EVENTS */
document.getElementById("month").addEventListener("change", generateMonth);

document.addEventListener("change", e=>{
  const row = e.target.closest("tr");
  if(row) calculateRow(row);
});

</script>

</body>
</html>
