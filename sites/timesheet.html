<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timesheet_Pro_2</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  padding:20px;
}

.container { max-width:1400px; margin:auto; }

h1 { margin-bottom:20px; color:#32d296; }

.control-panel {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:20px;
}

.field { display:flex; flex-direction:column; }

label {
  font-size:12px;
  color:#b8c3e6;
  margin-bottom:5px;
}

select, input.top-input {
  padding:8px;
  border-radius:6px;
  background:#1c2541;
  color:#fff;
  border:none;
  min-width:200px;
}

/* TABLE */
.table-container {
  background:#1c2541;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
}

table { width:100%; border-collapse:collapse; }

th, td {
  padding:10px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
}

thead { background:#111a33; }

th { position:sticky; top:0; }

input {
  width:100%;
  padding:5px;
  border:none;
  border-radius:4px;
}

.time-in {
  background:#2a355f;
  color:#fff;
  font-weight:bold;
}

.food-yes { color:#32d296; font-weight:bold; }
.food-no { color:#ff6b6b; font-weight:bold; }

.summary {
  display:flex;
  justify-content:space-between;
  margin-top:20px;
  background:#1c2541;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>⏱ Timesheet_Pro_2</h1>

<div class="control-panel">

<div class="field">
<label>Month</label>
<select id="month">
<option value="">Select</option>
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>
</div>

<div class="field">
<label>Engineer</label>
<select id="engineer">
<option value="">Select</option>

<option value="abhignya.reddy@linkquestglobal.com" data-phone="">Abhignya Reddy</option>
<option value="pavinee.suwanta@linkquestglobal.com" data-phone="">Pavinee Suwanta</option>
<option value="parviz.ansari@linkquestglobal.com" data-phone="04220100700">Parviz Ansari (Work)</option>
<option value="parvizans@gmail.com" data-phone="04220100700">Parviz Ansari (Personal)</option>
<option value="parthk0804@gmail.com" data-phone="">Parth Kumbhare</option>
<option value="abhishek.ahirrao@linkquestglobal.com" data-phone="">Abhishek Ahirrao</option>
<option value="sanjay.nampally@linkquestglobal.com" data-phone="">Sanjay Nampally</option>
<option value="saidinesh.mogili@linkquestglobal.com" data-phone="">Sai Dinesh Mogili</option>
<option value="manish.redekar@linkquestglobal.com" data-phone="">Manish Redekar</option>
<option value="shivtejgasti@gmail.com" data-phone="">Shivtej Gasti</option>
<option value="skofficial8991@gmail.com" data-phone="">Shreekant Kadam</option>
<option value="ergaganverma@gmail.com" data-phone="">Gagan Verma</option>

</select>
</div>

<div class="field">
<label>Email</label>
<input id="eng-email" class="top-input" readonly>
</div>

<div class="field">
<label>Phone</label>
<input id="eng-phone" class="top-input" readonly>
</div>

<div class="field">
<label>Location</label>
<select id="location">
<option value="sydney">Sydney</option>
<option value="outside">Outside Sydney</option>
</select>
</div>

</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Day</th>
<th>Date</th>
<th>Time In</th>
<th>Time Out</th>
<th>Total</th>
<th>OT</th>
<th>Food</th>
</tr>
</thead>
<tbody id="timesheet-body"></tbody>
</table>
</div>

<div class="summary">
<div>Total Hours: <span id="total-hours">0</span></div>
<div>Total OT: <span id="total-ot">0</span></div>
</div>

</div>

<script>

const tableBody = document.getElementById("timesheet-body");

/* ENGINEER AUTO-FILL */
document.getElementById("engineer").addEventListener("change", function(){
  const selected = this.options[this.selectedIndex];
  document.getElementById("eng-email").value = selected.value || "";
  document.getElementById("eng-phone").value = selected.dataset.phone || "";
});

/* GENERATE */
function generateMonth() {
  const month = document.getElementById("month").value;
  if(month==="") return;

  const year = new Date().getFullYear();
  const days = new Date(year, parseInt(month)+1, 0).getDate();

  tableBody.innerHTML="";

  for(let i=1;i<=days;i++){
    const date = new Date(year, month, i).toISOString().split('T')[0];

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${i}</td>
      <td><input type="date" value="${date}"></td>
      <td><input type="time" value="08:00" readonly class="time-in"></td>
      <td><input type="time" class="time-out"></td>
      <td class="total">0</td>
      <td class="ot">0</td>
      <td class="food">-</td>
    `;

    tableBody.appendChild(row);
  }
}

/* CALCULATION */
function calculateRow(row){
  const timeOut = row.querySelector(".time-out").value;
  if(!timeOut) return;

  const start = new Date("1970-01-01T08:00:00");
  const end = new Date(`1970-01-01T${timeOut}:00`);

  let total = (end-start)/(1000*60*60);
  if(total<0) total=0;

  const ot = total>10 ? total-10 : 0;

  row.querySelector(".total").innerText = total.toFixed(2);
  row.querySelector(".ot").innerText = ot.toFixed(2);

  const location = document.getElementById("location").value;
  const foodCell = row.querySelector(".food");

  if(location==="outside"){
    foodCell.innerText = "$50";
    foodCell.className = "food food-yes";
  } else {
    foodCell.innerText = "-";
    foodCell.className = "food food-no";
  }

  updateSummary();
}

/* EVENTS */
tableBody.addEventListener("change", e=>{
  const row = e.target.closest("tr");
  if(row) calculateRow(row);
});

tableBody.addEventListener("input", e=>{
  const row = e.target.closest("tr");
  if(row) calculateRow(row);
});

/* SUMMARY */
function updateSummary(){
  let total=0, ot=0;

  document.querySelectorAll("tbody tr").forEach(r=>{
    total += parseFloat(r.querySelector(".total").innerText)||0;
    ot += parseFloat(r.querySelector(".ot").innerText)||0;
  });

  document.getElementById("total-hours").innerText = total.toFixed(2);
  document.getElementById("total-ot").innerText = ot.toFixed(2);
}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("month").addEventListener("change", generateMonth);
});

</script>

</body>
</html>
