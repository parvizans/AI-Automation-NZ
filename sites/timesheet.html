body {

.container { max-width:1400px; margin:auto; }

h1 { margin-bottom:20px; color:#32d296; }

/* CONTROL PANEL GRID */
.control-panel {

  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}

.field { display:flex; flex-direction:column; }

label {

  color:#b8c3e6;

select, input {

  border-radius:6px;

/* GREEN BOX */

  padding:10px;

}

/* TABLE */
.table-container {
  background:#1c2541;
  padding:10px;
  border-radius:10px;
}

table { width:100%; border-collapse:collapse; }

th, td {
  padding:10px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
}

thead { background:#111a33; }

.time-in {

  font-weight:bold;
}

.food-yes { color:#32d296; font-weight:bold; }
.food-no { color:#ff6b6b; }

/* SUMMARY */
.summary-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  margin-top:20px;
}

.card {
  padding:15px;
  border-radius:10px;
  font-weight:bold;
}

.weekday { background:#1c2541; }
.weekend { background:#2a1c1c; }

/* BUTTONS */
.actions {
  margin-top:20px;
  display:flex;
  gap:10px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.save { background:#32d296; }
.export { background:#5aa7ff; }
.submit { background:#ffcc00; }

</style>
</head>

<script>

document.addEventListener("DOMContentLoaded", function(){

/* AUTO FILL */
document.getElementById("engineer").addEventListener("change", function(){
  const s = this.options[this.selectedIndex];
  document.getElementById("eng-email").value = s.value;
  document.getElementById("eng-phone").value = s.dataset.phone || "";
});

document.getElementById("pm").addEventListener("change", function(){
  document.getElementById("pm-email").value = this.value;
});

/* DAY NAME */
function getDayName(date){
  return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][date.getDay()];
}

/* GENERATE */
function generateMonth(){
  const month = document.getElementById("month").value;
  if(month==="") return;

  const year = new Date().getFullYear();
  const days = new Date(year, parseInt(month)+1, 0).getDate();

  const tbody = document.getElementById("timesheet-body");
  tbody.innerHTML="";

  for(let i=1;i<=days;i++){
    const d = new Date(year, month, i);
    const date = d.toISOString().split('T')[0];

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${i}</td>
      <td><input type="date" value="${date}"></td>
      <td>${getDayName(d)}</td>
      <td><input type="time" value="08:00" readonly class="time-in"></td>
      <td>
        <select class="time-hour">
          ${Array.from({length: 24}, (_, i) =>
            `<option value="${String(i).padStart(2,'0')}">${String(i).padStart(2,'0')}</option>`
          ).join("")}
        </select>
        <select class="time-minute">
          <option value="00">00</option>
          <option value="15">15</option>
          <option value="30">30</option>
          <option value="45">45</option>
        </select>
      </td>
      <td class="total">0</td>
      <td class="ot">0</td>
      <td class="food">-</td>
    `;

    tbody.appendChild(row);
  }
}

/* EVENTS */
document.getElementById("month").addEventListener("change", generateMonth);

document.addEventListener("change", e=>{
  const row = e.target.closest("tr");
  if(row) calculateRow(row);
});

}); // 🔥 IMPORTANT CLOSING

/* KEEP THESE OUTSIDE (GLOBAL FUNCTIONS) */

function scrollToTop() {

function generateInvoice() {
  const name = document.getElementById("inv_name").value;
  const hours = document.getElementById("inv_hours").value;
  const rate = document.getElementById("inv_rate").value;

  document.getElementById("invoiceResult").innerHTML =
    "Invoice for " + name + "<br>Total: $" + (hours * rate);
}

function calculateExpense() {
  const fuel = Number(document.getElementById("fuel").value) || 0;
  const hotel = Number(document.getElementById("hotel").value) || 0;
  const food = Number(document.getElementById("food").value) || 0;

  document.getElementById("expenseResult").innerHTML =
    "Total Expense: $" + (fuel + hotel + food);
}
