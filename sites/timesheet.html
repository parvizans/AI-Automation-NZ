<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timesheet_Pro_2</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  padding:20px;
}

.container { max-width:1400px; margin:auto; }

h1 { margin-bottom:20px; color:#32d296; }

.control-panel {
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:20px;
  align-items:flex-end;
}

.field { display:flex; flex-direction:column; }

label {
  font-size:12px;
  color:#b8c3e6;
  margin-bottom:5px;
}

select {
  padding:8px;
  border-radius:6px;
  background:#1c2541;
  color:#fff;
  border:none;
  min-width:160px;
}

/* GREEN BOX */
.expected-box {
  background:#32d296;
  color:#000;
  padding:10px 18px;
  border-radius:8px;
  font-weight:bold;
}

/* TABLE */
.table-container {
  background:#1c2541;
  padding:10px;
  border-radius:10px;
}

table { width:100%; border-collapse:collapse; }

th, td {
  padding:10px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
}

thead { background:#111a33; }

.time-in {
  background:#2a355f;
  color:#fff;
  font-weight:bold;
}

.food-yes { color:#32d296; font-weight:bold; }
.food-no { color:#ff6b6b; font-weight:bold; }

/* SUMMARY BLOCKS */
.summary-grid {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:15px;
  margin-top:20px;
}

.card {
  padding:15px;
  border-radius:10px;
  font-weight:bold;
}

.weekday { background:#1c2541; }
.weekend { background:#2a1c1c; }

.card span {
  color:#32d296;
}

/* BUTTONS */
.actions {
  margin-top:20px;
  display:flex;
  gap:10px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.save { background:#32d296; }
.export { background:#5aa7ff; }
.submit { background:#ffcc00; }

</style>
</head>

<body>

<div class="container">

<h1>⏱ Timesheet_Pro_2</h1>

<div class="control-panel">

<select id="month">
<option value="">Select Month</option>
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>

<select id="location">
<option value="sydney">Sydney</option>
<option value="outside">Outside Sydney</option>
</select>

<div class="expected-box">Expected: 8h/day</div>

</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Day</th>
<th>Date</th>
<th>Time In</th>
<th>Time Out</th>
<th>Total</th>
<th>OT</th>
<th>Food</th>
</tr>
</thead>
<tbody id="timesheet-body"></tbody>
</table>
</div>

<!-- ✅ SUMMARY -->
<div class="summary-grid">

<div class="card weekday">
Weekdays Days: <span id="wd-days">0</span><br>
Weekdays Hours: <span id="wd-hours">0</span>
</div>

<div class="card weekend">
Weekend Days: <span id="we-days">0</span><br>
Weekend OT: <span id="we-ot">0</span>
</div>

</div>

<!-- ✅ BUTTONS -->
<div class="actions">
<button class="save">Save</button>
<button class="export">Export</button>
<button class="submit">Submit</button>
</div>

</div>

<script>

const tableBody = document.getElementById("timesheet-body");

/* GENERATE */
function generateMonth() {
  const month = document.getElementById("month").value;
  if(month==="") return;

  const year = new Date().getFullYear();
  const days = new Date(year, parseInt(month)+1, 0).getDate();

  tableBody.innerHTML="";

  for(let i=1;i<=days;i++){
    const dateObj = new Date(year, month, i);
    const date = dateObj.toISOString().split('T')[0];

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${i}</td>
      <td><input type="date" value="${date}"></td>
      <td><input type="time" value="08:00" readonly class="time-in"></td>
      <td><input type="time" class="time-out"></td>
      <td class="total">0</td>
      <td class="ot">0</td>
      <td class="food">-</td>
    `;

    tableBody.appendChild(row);
  }
}

/* CALCULATION */
function calculateRow(row){
  const timeOut = row.querySelector(".time-out").value;
  if(!timeOut) return;

  const dateVal = row.querySelector("input[type=date]").value;
  const day = new Date(dateVal).getDay(); // 0 Sun, 6 Sat

  const start = new Date("1970-01-01T08:00:00");
  const end = new Date(`1970-01-01T${timeOut}:00`);

  let total = (end-start)/(1000*60*60);
  if(total<0) total=0;

  const ot = total > 8 ? total - 8 : 0;

  row.querySelector(".total").innerText = total.toFixed(2);
  row.querySelector(".ot").innerText = ot.toFixed(2);

  const location = document.getElementById("location").value;
  const foodCell = row.querySelector(".food");

  if(location==="outside"){
    foodCell.innerText = "$50";
    foodCell.className = "food food-yes";
  } else {
    foodCell.innerText = "-";
    foodCell.className = "food food-no";
  }

  updateSummary();
}

/* SUMMARY */
function updateSummary(){

  let wdDays=0, wdHours=0, weDays=0, weOT=0;

  document.querySelectorAll("tbody tr").forEach(row=>{
    const dateVal = row.querySelector("input[type=date]").value;
    const day = new Date(dateVal).getDay();

    const total = parseFloat(row.querySelector(".total").innerText)||0;
    const ot = parseFloat(row.querySelector(".ot").innerText)||0;

    if(day===0 || day===6){
      if(total>0) weDays++;
      weOT += ot;
    } else {
      if(total>0) wdDays++;
      wdHours += total;
    }
  });

  document.getElementById("wd-days").innerText = wdDays;
  document.getElementById("wd-hours").innerText = wdHours.toFixed(2);
  document.getElementById("we-days").innerText = weDays;
  document.getElementById("we-ot").innerText = weOT.toFixed(2);
}

/* EVENTS */
tableBody.addEventListener("change", e=>{
  const row = e.target.closest("tr");
  if(row) calculateRow(row);
});

/* INIT */
document.getElementById("month").addEventListener("change", generateMonth);

</script>

</body>
</html>
