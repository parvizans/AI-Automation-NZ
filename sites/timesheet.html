<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timesheet_Pro_2</title>
<link rel="stylesheet" href="timesheet.css">
</head>

<body class="timesheet">

<!-- ✅ SAVE TOAST (ADD THIS BLOCK HERE) -->
<div id="saveToast" style="
  position:fixed;
  bottom:20px;
  right:20px;
  background:#32d296;
  color:#000;
  padding:10px 15px;
  border-radius:5px;
  display:none;
  font-weight:bold;
  z-index:9999;
">
  Saved ✅
</div>

<div class="container">

<h1>⏱ Timesheet_Pro_2</h1>

<!-- TOP BUTTONS -->
<div class="top-buttons">
  <button onclick="goHome()" class="yellow">🏠 Home</button>
  <button onclick="goInvoice()" class="blue">📄 Invoice</button>
  <button onclick="goExpenses()" class="yellow">💰 Expenses</button>
  <button onclick="saveTimesheet()" class="blue">Save</button>
  <button onclick="resetTimesheet()" class="blue">Reset</button>

  <a href="master-invoice.html" target="_blank" class="blue"
     style="padding:10px 20px; border-radius:6px; display:inline-block; text-decoration:none; font-weight:bold;">
     📊 Master Invoice
  </a>
</div>

<!-- CONTROL PANEL -->
<div class="control-panel">

<div class="field">
<label>Month</label>
<select id="month">
<option value="">Select</option>
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>
</div>

<div class="field">
<label>Engineer</label>
<select id="engineer">
<option value="">Select</option>
<option value="abhignya.reddy@automationpark.tech" data-phone="6100000000">Abhignya Reddy</option>
<option value="parviz.ansari@automationpark.tech" data-phone="64220100700">Parviz Ansari</option>
</select>
</div>

<div class="field">
<label>Email</label>
<input id="eng-email" readonly>
</div>

<div class="field">
<label>Phone</label>
<input id="eng-phone" readonly>
</div>

<div class="field">
<label>Project</label>
<input type="text" id="project" placeholder="Enter Project Name / Code">
</div>

<div class="field">
<label>Project Manager</label>
<select id="pm">
<option value="">Select</option>
<option value="Parviz.Ansari@automationpark.tech">Parviz Ansari</option>
<option value="Behrouz.Lotfipour@automationpark.tech">Behrouz Lotfipour</option>
</select>
</div>

<div class="field">
<label>PM Email</label>
<input id="pm-email" readonly>
</div>

<div class="field">
<label>Location</label>
<select id="location">
<option value="Australia">Australia</option>
<option value="New Zealand">New Zealand</option>
</select>
</div>

<div class="expected-box">Expected: 8h/day</div>

</div>

<!-- TABLE -->
<div class="table-container">
<table>
<thead>
<tr>
<th>Day</th>
<th>Date</th>
<th>Weekday</th>
<th>Time In</th>
<th>Time Out</th>
<th>Total</th>
<th>OT</th>
<th>Location</th>
<th>Food</th>
</tr>
</thead>
<tbody id="timesheet-body"></tbody>
</table>
</div>

<!-- SUMMARY -->
<div class="summary-grid">
<div class="card weekday">
Weekdays Days: <span id="wd-days">0</span><br>
Weekdays Hours: <span id="wd-hours">0</span><br>
Weekdays OT: <span id="wd-ot">0</span>
</div>

<div class="card weekend">
Weekend Days: <span id="we-days">0</span><br>
Weekend OT: <span id="we-ot">0</span>
</div>
</div>

<!-- ACTIONS -->
<div class="actions">
<button onclick="saveTimesheet()">Save</button>
<button onclick="resetTimesheet()">Reset</button>
</div>

</div>

<script src="timesheet.js"></script>

<footer class="footer">
<div>
© 2026 AutomationPark — All Rights Reserved
</div>
<div>
Contact: automationpark.tech<br>
+64 220100700
</div>
</footer>

</body>
</html>
