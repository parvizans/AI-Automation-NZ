<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timesheet_Pro_2</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  padding:20px;
}

.container {
  max-width:1200px;
  margin:auto;
}

h1 {
  margin-bottom:20px;
  color:#32d296;
}

/* CONTROL PANEL */
.control-panel {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:20px;
}

.field {
  display:flex;
  flex-direction:column;
}

label {
  font-size:12px;
  color:#b8c3e6;
  margin-bottom:5px;
}

select {
  padding:8px;
  border-radius:6px;
  background:#1c2541;
  color:#fff;
  border:none;
  min-width:160px;
}

/* TABLE */
.table-container {
  background:#1c2541;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
}

thead {
  background:#111a33;
}

th {
  position:sticky;
  top:0;
}

tbody tr:nth-child(even) {
  background:rgba(255,255,255,0.03);
}

input {
  width:100%;
  padding:5px;
  border:none;
  border-radius:4px;
}

.time-in {
  background:#2a355f;
  color:#fff;
  font-weight:bold;
}

/* SUMMARY */
.summary {
  display:flex;
  justify-content:space-between;
  margin-top:20px;
  background:#1c2541;
  padding:15px;
  border-radius:10px;
}

/* BUTTONS */
.actions {
  margin-top:20px;
  display:flex;
  gap:10px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:6px;
  background:#32d296;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

button.submit {
  background:#5aa7ff;
}
</style>
</head>

<body>

<div class="container">

<h1>⏱ Timesheet_Pro_2</h1>

<div class="control-panel">

<div class="field">
<label>Month</label>
<select id="month">
<option value="">Select</option>
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>
</div>

<div class="field">
<label>Engineer</label>
<select id="engineer">
<option value="">Select</option>
<option value="abhignya.reddy@linkquestglobal.com">Abhignya</option>
<option value="parviz.ansari@linkquestglobal.com">Parviz</option>
</select>
</div>

<div class="field">
<label>Project Manager</label>
<select id="pm">
<option value="">Select</option>
<option value="dani.ray.salcedo@accenture.com">Dani</option>
<option value="Alyanna.Moje@accenture.com">Alyanna</option>
<option value="neil.coomar@linkquestglobal.com">Neil</option>
</select>
</div>

<div class="field">
<label>Project</label>
<select>
<option>Telecom</option>
</select>
</div>

<div class="field">
<label>Status</label>
<select>
<option>Draft</option>
<option>Submitted</option>
</select>
</div>

</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Day</th>
<th>Date</th>
<th>Time In</th>
<th>Time Out</th>
<th>Break</th>
<th>Total</th>
<th>OT</th>
<th>Notes</th>
</tr>
</thead>
<tbody id="timesheet-body"></tbody>
</table>
</div>

<div class="summary">
<div>Total Hours: <span id="total-hours">0</span></div>
<div>Total OT: <span id="total-ot">0</span></div>
</div>

<div class="actions">
<button onclick="saveData()">Save</button>
<button onclick="exportData()">Export</button>
<button class="submit" onclick="submitTimesheet()">Submit</button>
</div>

</div>

<script>

const tableBody = document.getElementById("timesheet-body");

/* GENERATE MONTH */
function generateMonth() {
  const month = document.getElementById("month").value;
  if(month==="") return;

  const year = new Date().getFullYear();
  const days = new Date(year, parseInt(month)+1, 0).getDate();

  tableBody.innerHTML="";

  for(let i=1;i<=days;i++){
    const date = new Date(year, month, i).toISOString().split('T')[0];

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${i}</td>
      <td><input type="date" value="${date}"></td>
      <td><input type="time" value="08:00" readonly class="time-in"></td>
     <td>
  <select class="hour">
    <option>12</option>
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option>5</option>
    <option selected>6</option>
    <option>7</option>
    <option>8</option>
    <option>9</option>
    <option>10</option>
    <option>11</option>
  </select>

  <select class="minute">
    <option>00</option>
    <option>15</option>
    <option selected>30</option>
    <option>45</option>
  </select>

  <select class="ampm">
    <option>AM</option>
    <option selected>PM</option>
  </select>
</td>
      <td><input type="number" value="0" class="break"></td>
      <td class="total">0</td>
      <td class="ot">0</td>
      <td><input type="text"></td>
    `;

    tableBody.appendChild(row);
  }
}

/* CALCULATION */
tableBody.addEventListener("input", e=>{
  const row = e.target.closest("tr");
  if(!row) return;

  const timeOut = row.querySelector(".time-out").value;
  const breakTime = parseFloat(row.querySelector(".break").value)||0;

  if(!timeOut) return;

  const start = new Date("1970-01-01T08:00:00");
  const end = new Date(`1970-01-01T${timeOut}:00`);

  let total = (end-start)/(1000*60*60)-breakTime;
  if(total<0) total=0;

  const ot = total>10 ? total-10 : 0;

  row.querySelector(".total").innerText = total.toFixed(2);
  row.querySelector(".ot").innerText = ot.toFixed(2);

  updateSummary();
});

/* SUMMARY */
function updateSummary(){
  let total=0, ot=0;

  document.querySelectorAll("tbody tr").forEach(r=>{
    total += parseFloat(r.querySelector(".total").innerText)||0;
    ot += parseFloat(r.querySelector(".ot").innerText)||0;
  });

  document.getElementById("total-hours").innerText = total.toFixed(2);
  document.getElementById("total-ot").innerText = ot.toFixed(2);
}

/* EMAIL */
function submitTimesheet(){
  const eng = document.getElementById("engineer").value;
  const pm = document.getElementById("pm").value;

  if(!eng || !pm){
    alert("Select Engineer & PM");
    return;
  }

  const cc = "neil.coomar@linkquestglobal.com,sudhir.singh@atlantisintel.com";

  window.location.href =
  `mailto:${pm}?cc=${cc}&subject=Timesheet Submission`;
}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("month").addEventListener("change", generateMonth);
});

</script>

</body>
</html>
