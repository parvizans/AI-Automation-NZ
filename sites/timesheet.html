<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: #fff;
  padding: 20px;
}

/* CONTAINER */
.container {

  margin: auto;
}

/* HEADER */

}

/* CONTROL PANEL */
.control-panel {

  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.control-panel select {
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #1c2541;
  color: #fff;
}

/* TABLE */
.table-container {
  overflow-x: auto;
  background: #1c2541;
  border-radius: 10px;
  padding: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

/* HEADER */
thead {
  background: #111a33;
}

th {
  position: sticky;
  top: 0;
  background: #111a33;
}

th, td {
  padding: 10px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
}

/* ZEBRA */
tbody tr:nth-child(even) {
  background: rgba(255,255,255,0.03);
}

/* INPUTS */
input {
  width: 100%;
  padding: 5px;
  border: none;
  border-radius: 4px;
}

/* SUMMARY */
.summary {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  background: #1c2541;
  padding: 15px;
  border-radius: 10px;

/* BUTTONS */

button {

<script>

/* GENERATE TABLE */
const tableBody = document.getElementById("timesheet-body");

function generateMonthBySelection() {

  const tableBody = document.getElementById("timesheet-body");
  const month = document.getElementById("month").value;
  const year = new Date().getFullYear();

  if (month === "") return;

  const daysInMonth = new Date(year, parseInt(month) + 1, 0).getDate();

  tableBody.innerHTML = "";

  for (let i = 1; i <= daysInMonth; i++) {

    const date = new Date(year, month, i);
    const formattedDate = date.toISOString().split('T')[0];

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${i}</td>
      <td><input type="date" value="${formattedDate}"></td>
      <td><input type="time" value="08:00" readonly class="time-in"></td>
      <td><input type="time" class="time-out"></td>
      <td><input type="number" value="0" class="break"></td>
      <td class="total">0</td>
      <td class="ot">0</td>
      <td><input type="text"></td>
    `;

    tableBody.appendChild(row);
  }
}

/* CALCULATION */
tableBody.addEventListener("input", (e) => {
  const row = e.target.closest("tr");

  const timeOut = row.querySelector(".time-out").value;
  const breakTime = parseFloat(row.querySelector(".break").value) || 0;

  if (!timeOut) return;

  const start = new Date(`1970-01-01T08:00:00`);
  const end = new Date(`1970-01-01T${timeOut}:00`);

  let total = (end - start) / (1000 * 60 * 60) - breakTime;
  if (total < 0) total = 0;

  const ot = total > 10 ? total - 10 : 0;

  row.querySelector(".total").innerText = total.toFixed(2);
  row.querySelector(".ot").innerText = ot.toFixed(2);

  updateSummary();
});

function updateSummary() {
  let totalHours = 0;
  let totalOT = 0;

  document.querySelectorAll("tbody tr").forEach(row => {
    totalHours += parseFloat(row.querySelector(".total").innerText) || 0;
    totalOT += parseFloat(row.querySelector(".ot").innerText) || 0;
  });

  document.getElementById("total-hours").innerText = totalHours.toFixed(2);
  document.getElementById("total-ot").innerText = totalOT.toFixed(2);
}

/* SAVE (LOCAL STORAGE) */
function saveData() {
  const data = [];
  document.querySelectorAll("tbody tr").forEach(row => {
    data.push({
      date: row.querySelector("input[type=date]").value,
      timeout: row.querySelector(".time-out").value,
      break: row.querySelector(".break").value,
      notes: row.querySelector("input[type=text]").value
    });
  });

  localStorage.setItem("timesheet", JSON.stringify(data));
  alert("Saved!");
}

/* EXPORT */

  alert("Export feature coming next 🚀");

  /* ✅ ADD THIS FUNCTION BELOW */

  const totalOT = document.getElementById("total-ot").innerText;

  const body = `
Hello,

Please find my timesheet submission.

Total Hours: ${totalHours}
Overtime: ${totalOT}

${engineer}
`;

  const mailto = `mailto:${pm}?cc=${cc}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

  window.location.href = mailto;
}
  document.addEventListener("DOMContentLoaded", () => {
  const monthSelect = document.getElementById("month");

  if (monthSelect) {
    monthSelect.addEventListener("change", generateMonthBySelection);
  }
});
  
</script>
