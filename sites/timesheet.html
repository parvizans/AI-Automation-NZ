<!DOCTYPE html>
<html>
<head>
  <title>Smart Timesheet</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      padding: 20px;
    }

    h2 {
      color: #32d296;
    }
    
    <label>Date</label>
    <input type="date" id="date">

   .card {
  background: #1c2541;
  padding: 25px;
  border-radius: 15px;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

label {
  font-size: 14px;
  margin-top: 5px;
}
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #32d296;
      cursor: pointer;
    }

    table {
      margin-top: 20px;
      width: 100%;
      border-collapse: collapse;
    }

    td, th {
      padding: 10px;
      border-bottom: 1px solid #444;
    }
    select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}
      input[disabled] {
  background: #2f3b5f;
  color: #ffffff;
  font-weight: bold;
  opacity: 1;
}
  </style>
</head>

<body>

<h2>🚀 Smart Timesheet</h2>

<div class="card">

  <label>Engineer</label>
<select id="engineer">
  <option>Parviz</option>
  <option>Engineer1</option>
  <option>Engineer2</option>
</select>

<label>Project</label>
<select id="project">
  <option>Drive Test</option>
  <option>Optimization</option>
  <option>Integration</option>
</select>

<label>Time-Out</label>
<input type="time" id="timeout" value="18:00">

<button onclick="saveEntry()">Save</button>

</div>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Day</th>
      <th>Engineer</th>
      <th>Project</th>
      <th>Hours</th>
      <th>OT</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

<h3 id="summary"></h3>
  
  <thead>
    ...
  </thead>

  <tbody id="table"></tbody>

</table>
  
  <h3 id="summary"></h3>
<script>

function getToday() {
  let today = new Date().toISOString().split("T")[0];
  document.getElementById("date").value = today;
}

function calculate(timeout) {
  let timeIn = new Date("2024-01-01T08:00:00");
  let timeOut = new Date("2024-01-01T" + timeout + ":00");

  let hours = (timeOut - timeIn) / (1000 * 60 * 60);
  let ot = hours > 10 ? hours - 10 : 0;

  return { hours, ot };
}

function saveEntry() {
 let date = document.getElementById("date").value;
let timeout = document.getElementById("timeout").value;
let engineer = document.getElementById("engineer").value;
let project = document.getElementById("project").value;

  let calc = calculate(timeout);

 let entry = {
  date,
  day: new Date(date).toLocaleDateString("en-US", { weekday: 'short' }),
  engineer,
  project,
  hours: calc.hours.toFixed(2),
  ot: calc.ot.toFixed(2)
};
  let data = JSON.parse(localStorage.getItem("timesheet")) || [];
  data.push(entry);

  localStorage.setItem("timesheet", JSON.stringify(data));

  render();

  alert("Saved ✅ Hours: " + entry.hours + " | OT: " + entry.ot);
}

function deleteEntry(index) {
  let data = JSON.parse(localStorage.getItem("timesheet"));
  data.splice(index, 1);
  localStorage.setItem("timesheet", JSON.stringify(data));
  render();
}

function render() {
  let data = JSON.parse(localStorage.getItem("timesheet")) || [];
  let table = document.getElementById("table");
if (!table) return;

  table.innerHTML = "";

  let totalHours = 0;
  let totalOT = 0;

  data.forEach((e, i) => {

    totalHours += parseFloat(e.hours);
    totalOT += parseFloat(e.ot);

    let rowColor = e.ot > 0 ? "#2a1a1a" : "";

    table.innerHTML += `
      <tr style="background:${rowColor}">
       <td>${e.date}</td>
       <td>${e.day}</td>
       <td>${e.engineer}</td>
       <td>${e.project}</td>
       <td>${e.hours}</td>
       <td>${e.ot}</td>
       <td><button onclick="deleteEntry(${i})">❌</button></td>
      </tr>
    `;
  });

  document.getElementById("summary").innerText =
    "Total Hours: " + totalHours.toFixed(1) +
    " | Total OT: " + totalOT.toFixed(1);
}

getToday();
render();

</script>

</body>
</html>
