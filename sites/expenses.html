<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expenses</title>

<style>

/* =========================
   BODY
========================= */
body {
  font-family: Arial;
  color:#fff;
  margin:0;
  padding:20px;

  background:
    linear-gradient(rgba(11,18,32,0.85), rgba(11,18,32,0.85)),
    url("assets/invoice-bg.jpg");

  background-size: cover;
  background-position: center;
}

/* =========================
   CONTAINER
========================= */
.container {
  max-width:1200px;
  margin:auto;
}

h1 {
  color:#32d296;
  margin-bottom:20px;
}

/* =========================
   HEADER GRID
========================= */
.header-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}
.card {
  background:#1c2541;
  padding:15px;
  border-radius:10px;
}

.card label {
  font-size:12px;
  color:#b8c3e6;
}

.card input, .card select {
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#2a355f;
  color:#fff;
}

/* =========================
   TABLE
========================= */
table {
  width:100%;
  border-collapse:collapse;
  background:rgba(0,0,0,0.6);
  border-radius:10px;
  overflow:hidden;
}

th, td {
  padding:16px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
  font-size:16px;
}

th {
  background:rgba(0,0,0,0.7);
}

/* =========================
   FINAL ROW
========================= */
.final {
  background:#0f9d58;
  font-weight:bold;
  font-size:18px;
}

/* =========================
   BUTTONS
========================= */
.btn {
  padding:12px 20px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.btn-green {
  background:#32d296;
  color:#000;
}

.btn-blue {
  background:#5aa7ff;
  color:#fff;
}

.btn-red {
  background:#ff6b6b;
  color:#fff;
}

</style>
</head>

<body>

<div class="container">

<h1>💰 Expense Claim</h1>

<!-- =========================
     HEADER
========================= -->
<div class="header-grid">

<div class="card">
<label>Engineer</label>
<select id="engName">
<option value="">Select Engineer</option>
<option>Parviz Ansari</option>
<option>Abhignya Reddy</option>
<option>Pavinee Suwanta</option>
<option>Abhishek Ahirrao</option>
<option>Sanjay Nampally</option>
<option>Sai Dinesh Mogili</option>
<option>Manish Redekar</option>
<option>Shivtej Gasti</option>
<option>Shreekant Kadam</option>
<option>Gagan Verma</option>
</select>
</div>

<div class="card">
<label>Project</label>
<select id="projectName">
<option value="">Select Project</option>
<option>ACCENTURE_TPG_QBM Drive Test</option>
<option>5G Optimization Project</option>
<option>Telecom PRJ001</option>
<option>Drive Test PRJ003</option>
</select>
</div>

<div class="card">
<label>Date</label>
<input type="date" id="todayDate">
</div>

<div class="card">
<label>Invoice #</label>
<select id="expenseInv">
<option value="">Select</option>
<option>INV-1001</option>
<option>INV-1002</option>
<option>INV-1003</option>
<option>INV-1004</option>
</select>
</div>



<!-- =========================
     TABLE
========================= -->
<table id="expenseTable">

<thead>
<tr>
<th>Type</th>
<th>Funding</th>
<th>Date</th>
<th>Day</th>
<th>Amount ($)</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr>
<td>
<select>
<option>Fuel</option>
<option>Hotel</option>
<option>Food</option>
<option>Rental Car</option>
<option>Tools</option>
<option>Phone</option>
<option>Parking</option>
<option>Other</option>
</select>
</td>

<td>
<select>
<option>Company CC</option>
<option>Engineer CC</option>
<option>Manager</option>
</select>
</td>

<td><input type="date"></td>

<td><span>-</span></td>

<td><input type="number" value="0"></td>

<td><button class="btn-red" onclick="removeRow(this)">X</button></td>

</tr>

</tbody>

<tfoot>
<tr class="final">
<td colspan="4">Total</td>
<td id="total">0</td>
<td></td>
</tr>
</tfoot>

</table>

<br>

<button class="btn btn-green" onclick="addRow()">➕ Add Row</button>

<br>

<button class="btn btn-blue" onclick="saveExpenses()">💾 Save to Invoice</button>

<br>

<button class="btn btn-green" onclick="goHome()">🏠 Back to Timesheet</button>

</div>

<!-- =========================
     SCRIPT
========================= -->
<script>

/* ADD ROW */
function addRow(){
  const table = document.querySelector("#expenseTable tbody");

  const row = `
  <tr>
    <td>
      <select>
        <option>Fuel</option>
        <option>Hotel</option>
        <option>Food</option>
        <option>Rental Car</option>
        <option>Tools</option>
        <option>Phone</option>
        <option>Parking</option>
        <option>Other</option>
      </select>
    </td>

    <td>
      <select>
        <option>Company CC</option>
        <option>Engineer CC</option>
        <option>Manager</option>
      </select>
    </td>

    <td><input type="date"></td>
    <td><span>-</span></td>
    <td><input type="number" value="0"></td>
    <td><button class="btn-red" onclick="removeRow(this)">X</button></td>
  </tr>
  `;

  table.insertAdjacentHTML("beforeend", row);
}

/* REMOVE */
function removeRow(btn){
  btn.closest("tr").remove();
  calculateTotal();
}

/* CALCULATE TOTAL */
document.addEventListener("input", calculateTotal);

function calculateTotal(){
  let total = 0;

  document.querySelectorAll("#expenseTable tbody tr").forEach(row=>{
    const val = Number(row.querySelector("input[type=number]").value) || 0;
    total += val;
  });

  document.getElementById("total").innerText = total.toFixed(2);
}

/* AUTO DAY */
document.addEventListener("change", function(e){
  if(e.target.type === "date"){
    const date = new Date(e.target.value);
    const day = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][date.getDay()];
    e.target.closest("tr").querySelector("span").innerText = day;
  }
});

/* SAVE TO INVOICE */
function saveExpenses(){
  const total = document.getElementById("total").innerText;
  localStorage.setItem("expenseTotal", total);
  alert("Saved to Invoice!");
}

/* NAV */
function goHome(){
  window.location.href = "timesheet.html";
}

</script>

</body>
</html>
